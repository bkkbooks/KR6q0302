body:
  text: 住徑山興聖萬壽禪寺語録侍者道隆編三門乘流而行過徑即止猶是時人升降處只今腳後腳前通汝活路佛殿提起坐具云捻聚放開放開捻聚黃面瞿曇無回避處龍王殿燒香一縷煙蓋天蓋地一滴水為雨為霖誰見龍王宮殿深踞方丈拍禪牀云者裡是吾父翁券內事縱橫殺活妙在不傳趙州親見老南泉拈勑黃挂域中日月立方外乾坤從至尊至貴中得來向無欲無依中流出雲行雨施三草二木升座拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲恭願南山比壽增聖壽以無疆北海為年資卜年而更遠趺座問答不録乃云是法非思量分別之所能解山上有鯉魚水底有蓬塵拈拄杖靠右邊云國一祖師過者邊著龍門上客未舉先知門外遊人徒勞斫額謝詞不録復舉世尊升座文殊白槌云諦觀法王法法王法如是世尊便下座師云法王法令頭正尾正只如世尊便下座時如何路入桃源深更深當晚小參孤峯頂上百草頭邊無古無今無彼無此三十年已前嶺雲淡濘三十年已後澗水逆流聞者見者少喜多嗔南來北來撞墻撞壁且誵訛在甚麼處此去三十年後切忌舉著復舉趙州因僧問二龍爭珠誰是得者州云老僧只管看雪竇云看即不無爭即不得且道扶者僧扶趙州師云趙州看也看得雪竇扶也扶得只是不知此珠來處上堂恁麼也不得不恁麼也不得恁麼不恁麼總不得衲僧門下者些子如南方人送蠱毒相似裹以金帛置之道傍過者莫敢正眼覷著覷著即禍事禍事上堂一有多種二無兩般花根本艷虎體元斑因甚缺齒老胡九年覷不破上堂言無展事語不投機承言者喪滯句者迷者裡如萬仞龍門相似風濤洶湧風雷變化只在須臾若是鱗龍頭角翻身一擲騰過太虗稍若躊躇燒尾曝腮有分中殿降錢供水陸升座僧問日暖風和三月天五峯峯頂藹祥煙椒庭一道恩光普聖算延鴻億萬年請師祝贊師云妙高山色青更青僧云向上還有事也無師云佛手遮不得僧云記得佛慈禪師云內祕菩薩行外現聖人身內行外身是一是二師云天下人共知僧云萬象森羅影現中又作麼生師云華嶽連天秀黃河徹底清僧云只如中殿興隆佛法作大福田錦上鋪花一句如何師云照天照地僧云劫石有消日皇恩無盡時禮拜歸衆師乃云摩訶衍法離四句絶百非唱愈高和愈寡聞箏起舞熟處難忘絶聽雨花望空啓告衲僧門下眼觀東南意在西北才恁麼便不恁麼何故此曲祇應天上有人間能得幾回聞復説偈云天生有大福德人與佛同時同現瑞是知心與佛心同母儀天下同化育如春及物春無迹如月印水月無痕天人中來道機熟應身摩耶顯慈力與天同壽福元元萬年密贊無為治山林演此無為法是亦名為報恩者浴佛上堂一花開天下春古佛為甚麼不著便雪竇恁麼大似蕭何制律徑山今日無端鐘聲鼓聲並奏法堂前大殿裏纍及諸人不著便雖然禍不入慎家之門結制小參大用現前不存軌則拈一放一得失兩忘前三後三聖凡俱泯若是凡情未盡聖量未忘未免病翮棲蘆困鱗止濼古德道十五日已前不得離我者裡若離者裡有鉤鉤你十五日已後不得住我者裡若住者裡有錐錐你便令鉤錐永息猶為敗落清時鐵網徒自縵空長城豈當至化只如不落數量脫灑一句如何當門不用栽荊棘後代兒孫惹著衣復舉睦州上堂問僧正云監寺聻正云不在州云都監闍梨聻正云不在州云上座聻正云不在州云三段不同今當第一向下文長付在來日師云無餺飥人知難作出在睦州手頭自然不同上堂結夏已過半月是知無無不是寒山子作麼生山前麥熟也未上堂舉睦州因僧問一言道盡時如何州云老僧在你鉢囊裡僧問雲門一言道盡時如何門云裂破師云忽有人問徑山一言道盡時如何只向他道退後退後上堂德山入門便棒臨濟入門便喝往往作棒喝會者如稻麻竹葦雖然被堅執鋭者望堯舜之治遠矣解夏上堂九夏賞勞叢林事例擊拂子云徑山退身三步許與諸人論量若謂有一法與人山僧眉鬚墮落若謂無一法與人諸人犯突吉羅罪恁麼則平出也且緩緩佛心禪師忌辰拈香云老和尚千鈞上弦遼天索價一言道盡貼地相酬而今驀路相逢諱不可得避亦無由著拜燒香將錯就錯何故覆水難收謝新舊兩班兼東山和尚上堂從上大用全提大機頓發徑山放過一著只貴言詮不及處文彩未彰時無先無後不東不西與麼説法還契得東山下左邊底也無客是主人相師開爐上堂説法不應機總是非時語百丈大溈説無道有是非時語趙州道我喚作火汝不得喚作火是非時語忽有人問徑山如何是應機底語片帆已過洞庭湖水鄉出隊歸上堂拈拄杖云拈起則大地全收放下則千差一舉賤若黃金貴如泥土恁麼會得撥轉華亭船載得朱涇月倘或遲疑太湖跨三州師景定二年十一月初六日恭奉聖旨特賜佛智禪師師領衆迎接望闕謝恩畢鳴鼓升座拈香祝聖罷據座説偈云和氣祥光靄九垓新陽端自日邊回龍峯高處君恩重先放花從鐵樹開上堂從上若佛若祖同共一箇舌頭若也識得只解小脫空林鴆砧井裡種林檎是小脫空山上有鯉魚水底有蓬塵是小脫空如何是大脫空他時後日待儞換却舌頭來却向儞道臘八上堂大小黃面瞿曇老了了了時何曾了因憶明星出現時夜來霜重知多少上堂舉雪峯因僧禮拜峯打五棒僧云某甲有甚麼過峯又打五棒明覺云雪竇不曾與人葛藤前五棒日照天臨後五棒雲騰致雨儞若辨得也好與五棒師云雪峯據令而行者僧分踈不下雪竇不曾與人葛藤徑山道得也得也除夜小參一年將盡夜古往今來知是幾回萬里未歸人倚墻靠壁有甚麼限徑山門下坐立儼然大家在者裡第一不問新年頭第二不問舊年尾又不似北禪老子傷鋒犯手篩鹽費醋一杯酒上樓一尺絹搗練虗張意氣徒逞奢華只據見定以雲門一曲向今夜吹唱寒山拍拾得笑不是黃鐘宮亦非大石調何也大盡三十日小盡二十九復舉德山示衆云問即有過不問猶乖有僧才出山便打僧云某甲話也未問因甚打某甲山云待汝開口堪作甚麼師云德山但知草偃風行不覺通身泥水者僧只見溪回路轉不知身在桃源徑山與麼批判一任諸方檢責上堂趙州喫茶去金牛喫飯來龍門多上客有人續得末後句許儞入阿字法門佛涅槃上堂真生無可生真滅無可滅與麼説法到他黃面老子面前也大遠在豈不見道若有一法過於涅槃吾説亦如夢幻結夏上堂落賴家風今日重舉草本多同西天此土謝首座秉拂上堂説摩訶衍法離四句百非拶從上險崖透千重百匝雷厲風飛龍馳虎驟青苗看經上堂繞禪牀一匝揮香案一下轉藏已竟講經已竟若具看經眼目方知落處其或未然依經解義三世佛冤離經一字還同魔説淨慈斷橋和尚遺書至上堂分圓照燈下炎天雪活弄南山鱉鼻蛇驗盡英靈提得藕絲牽玉象不存途轍只麼橫身異類行踏斷石橋成兩截解夏小參即心即佛獼猴探水月非心非佛硠蕩拾花針不是心不是佛當下便捻萬里崖州何況謹守蠟人尚他薄禮遵稟聖制敗落清時如何道得不傷物義句良久云有佛處不得住無佛處急走過復舉雲門因僧問樹凋葉落時如何門云體露金風師云看錮鏴著生鐵因甚雲門心肝五臟被者僧一摟摟盡上堂人間八月二十五洞山此日離查渡棒頭敲出玉麒麟江西湖南便與麼徑山閙裡揚碌甎誰道今人不如古九月旦上堂舉妙喜云古者道了得一萬事畢今朝是九月一作麼生了遂拈拄杖云若不喚住拄杖子便了取好既不喚作拄杖子且作麼生了擲下拄杖差之毫𨤲失之千里師云大衆還知麼拈拄杖卓云有買有賣開爐上堂舉佛眼請益五祖祖云我與儞説箇諭子如人牽牛從窗櫺中過頭角四蹄都過了只有尾巴過不得師云佛眼大似將一擔瞳換一擔顢頇就成一偈溪上煙波遠壺中日月長誰知冷灰裏九轉透瓶香上堂內裏打出氣力強外邊打入氣力弱擊拂子云者裡是甚麼所在説強説弱説內説外或問一錘打就時如何途路之樂不假一錘時如何萬里崖州畢竟如何放下拂子云放下便穩上堂舉世尊臨涅槃云若謂吾滅度即非吾弟子若謂吾不滅度亦非吾弟子師云釋迦老行計匇匇將當時百千萬億衆作死馬醫却至今無出身路且道瞿曇還有出身路也無下座結夏上堂以蠟人為驗病翼棲蘆以鐵彈子為驗困鱗止濼徑山不然擊拂子云一箭雙雕落普説門人惟實妙高編五湖衲子一錫禪人置身大叢林為了一大事當斷自胸中不可婆婆姆姆只向禪牀角頭老骨檛口頭取辦咬人語句以當參學達磨西來不立文字直指人心見性成佛早是埋沒爾後人孩撫爾後人大丈夫漢有天然氣槩十二時中行住坐臥痛自著鞭忽若己眼豁開便知達磨西來為汝證明而已行要儞自行到要儞自到透頂透底如鏡照鏡無絲毫透漏一一從胸襟中流出方能蓋天蓋地豈不見雪峯示衆云南山有條鱉鼻蛇汝等諸人切須好看當恁麼時盡大地人命若懸絲後來真淨道雪峯無大人相灼然是精識精然則蛇無頭不行又是一手擡一手搦長慶如新婦怕阿家相似便道堂中大有人喪身失命真淨恁麼道減人威光太煞雲門攛出拄杖作怕勢盡謂自起自倒大用現前殊不知龍頭蛇尾真淨著語云為蛇畫足是則是只知撿點別人不知兼身在內當時玄沙突得一句用南山作麼真淨道見處親切以此論之非特未得勦絶要且和他玄沙出窠窟不得雪竇具大眼目得大辨才反覆頌出如恆山蛇救首救尾直是活鱍鱍地象骨巖高人不到是甚麼人境界到者須是弄蛇手有麼有麼稜師備師不奈何爭怪得山僧喪身失命知多少一棚俊鶻韶陽知切忌落草重撥草果然南北東西無處討討甚麼兔子驀然突出拄杖頭弄死蛇手有甚麼限拋向雪峯大張口自傷己命大張口兮同閃電眨得眼來甚處去也剔起眉毛還不見蹉過也不知如今藏在乳峯前收來放去得人憎來者一一看方便踏著分明毒無藥竇復喝云看腳下何不早恁麼道淨慈將古人底一一花擘了也如國家兵器不得已而用之語中有語謂之死句語中無語謂之活句活句中薦得要見雪峯諸老則易要見雪竇真淨則難只如句意俱到殺活交馳莫有為雪峯作主底麼出來與淨慈相見其或未然遇挂牌時過訪靈隱告香普説叢林新人入門例有開室告香二事諸方臨夏告香一節不舉行久矣山僧叨冒此來已及兩月汩汩人事日不暇給向後入室之際兩班單寮暨諸宿德不必訪及若是晚學有志慕道者來自大方不妨商確然則道本無言因言顯道所以道道豈多途鶴有九臯難翥翼機不離位馬無千里謾追風直下如倚天長劒凜凜神威阿誰敢擬雖然我王庫內無如是刀何況百萬衆前拈花微笑分付正法眼藏禍不入慎家之門由是一人傳一人相誤賺直指單傳不立文字大似潑油救火黃梅夜半大庾嶺頭虐𦦨愈熾是甚麼物恁麼來説似一物則不中總是夢裏惺惺離四句絶百非今日頭痛不能為淨説得已是與賊過梯了也竪拂挂拂全機出沒直得耳聾三日一字入公門九牛車不出其餘發大機顯大用明修棧道暗度陳倉一條白棒佛來也打祖來也打三十年不曾打著一箇用盡自己心笑破他人口一喝分賓主照用一時行白日青天開眼溺牀後來拋栗棘擲金圈用暗號子大驚小怪其數河沙殊不知一一祭鬼神茶飯更無些子氣息從上間門破戶已是盡情併蕩了也衲僧家不挂風雲影像不涉泥水蹤由須信目前有條活路豈不見德山到溈山挾袱於堂上刺腦入膠盆從東過西從西過東道甚麼於是顧視云無無便出且莫草草雪竇云勘破了也賊須賊捉德山到門首却云也不得草草果然不丈夫遂乃重整威儀再入相見再來不直半文錢溈山坐次多口阿師德山提起坐具云和尚者野狐精溈山擬取拂子令不虗行德山便喝拂袖而去拈得鼻孔失却口雪竇又云勘破了也贓物現前德山背却法堂穿草鞋便行爭奈獅子腰折溈山晚間問首座云適來新到在甚麼處平地摝魚蝦首座云當時背法堂著草鞋出去也莫謗渠好溈山云此子已後向孤峯頂上盤結草菴呵佛罵祖去在面皮厚多少雪竇云雪上加霜正是據欵結案一勘破二勘破割菜鎌子雪上加霜曾險墮重疊關山飛騎將軍入虜庭可煞英雄再得完全能幾箇不是苦心人不知急走過不放過陳後説兵書孤峯頂上草裏坐靈山授記未到如此咄縵天網子二大老與麼相見一挨一拶一擡一搦大似傍若無人雪竇雖則路見不平也是助桀為虐靈隱恁麼道只貴後人撿責咄法語示元藏主住定林百丈已前無住持事是故得意之士深山窮谷茆茨石室折腳鐺中煮飯喫以了平生不求聞達不苟利養只靠本有一著子如靠一座須彌山豈特世人不得而親踈之世事亦不能軒輊之踐履既久霜露果熟間有不得已為龍天推致高出人天之表續佛慧命所以報佛恩德也後世淳離朴散風薄俗惡名挂官府如同戶籍之民而甘甜之貪冒寵榮隨世低昂曾不知佛之慧命為何物若夫師弟子緣契之妙扣關擊節風旋電卷如臨濟辭黃檗次檗呼侍者取禪板拂子來而濟即召侍者取火來便竪起殺人三角眼當此之時豈有師家邪後來又有磨衲入墨盆鐵鉢盛貓飯之作具此體裁方可以荷擔祖師擔子豈小緣邪新定林大拙早負英邁之氣蘊奇傑之才略不事事必思出世之學以了吾事裂縫掖毀琴劒無意功名之會稅駕于佛祖之域塵銷覺圓水落石出凡所過處無問道俗咸高其風慈水邑大夫之賢剡其名聞于郡於是定林之命遂下人唯恐其不來大拙之願無行意愈退愈光愈晦愈明是以平生衣糞掃衣行頭陀行雖自簪纓中來無一點子弟氣所謂大拙者蓋逃於拙寓於拙豈拙於用大邪古德云巧尚不可得而拙自何來須到巧拙俱忘處是為真拙發而用之橐籥爐鞴淬礪鉗錘便是臨濟到來也須鍛過方不負裂縫掖荷吾宗之素志也示端知客學道之士須夙有靈骨方有趣向分其間俊快遲鈍之不同有時節因緣之所繫非特後世之患如此昔雪峯真覺禪師自鰲山收拾不上之後便有大地如粒粟之旨彼三到投子九上洞山之日何曾欠缺玄沙頭陀由飛猿回避不及之後走終身不出嶺之譽二祖不往西天達磨不來東土之旨豈自外來然俊快之資與夫時節之來各有所待邪負丈夫不群氣宇不作則已作則萬竅怒號奮牙礪齒當與從上交臂佛祖之域直下如生鐵鑄就黃金打成一切處不能羅籠一切處不能埋沒俊鷹突日快梢雲與其七尺單前破蒲團上何如三家村裏荒草渡頭一句截流萬繭抽緒須知鰲山店上飛猿嶺頭正在半途示保上人歸廬山橫看成嶺側成峯遠近高低各不同不識廬山真面目都緣身在此山中向來買草鞋行腳撥草瞻風得住且住乃上人出此山之時拄杖生節回首知歸要行便行是上人入此山之時出一叢林不離此山入一叢林不即此山如此則行住坐臥以至動靜施為無非此山也若問廬山真面目春寒尚峭宜且善為道路示翁道士威音已前空劫那畔擔荷得行何處有許多周由者也杳冥恍惚不是老子説底直指人心不是達磨傳底道無心合人人無心合道一明一切明一透一切透如金翅擘海直取龍吞如香象渡河截流而過看他歸宗因僧來別宗云但去束裝臨行却來為儞説一上佛法僧如其言再上方丈宗云時寒途中善為若道有分付屈辱者僧若道無分付辜負歸宗翁高士氣度格量有衲子超方之作縱迹龍象蹴踏之地茲其時矣東行西行忽然覷破古人敗缺處則知萬壽土上加泥示英上人號無盡理隨事變理事無礙事得理融事事無礙此華嚴大人境界也得之者如懸鑑舉無遺照用之者如連環解之無窮雪竇將束須彌為筆蘸滄海為墨書虗空之紙乃至經不可説微塵數劫而為上人寫此無盡亦不能盡豈不見善財參尋知識末後至彌勒樓閣前暫時斂念云大慈大悲願樓閣門開令我得入尋時彌勒彈指一下樓閣門開善財得入入已還閉遂見百千萬億樓閣一一樓閣有一一彌勒於一一彌勒前有一一善財許多説話果何意邪英上人宜自著鞭求其所以名之之意異時眼開有善財寶樓閣前一解可謂名實相稱山河大地為汝發機草木叢林為汝發機以至森羅萬像無不是為汝發機時節所謂重重無盡無盡重重且道如今是第幾重法界日勢稍晚歸堂去示秀上人玉溪小師嘉定初太白峰前十二峯下嘗與玉溪來往兩山之間見其佩少室懸記後十年且聞玉溪吐瑞此破砂盆話行時也又十餘年見秀上人于鄞江歷談江西法窟中事欲觀其師先觀弟子正此謂也開口不在舌頭上話墮也大力量人擡腳不起未為分外得人憎難湊泊無出者些子如大火聚近之則燎却面門如太阿劒擬之則喪身失命秀上人由湖南北浙東西為此事親行一遭點著玉溪舊時行處便有罵父翁之意心憤憤口悱悱必欲再禮拜玉溪一回坐具頭邊眼活不得道有此好事不為人説切忌墮他古人覆轍示深藏主我宗無語句亦無一法與人已是平地上深深掘窖埋却多少人也何況思而知之不思而知總是二頭三首若具天然氣槩終不受者般茶飯雲門放洞山三頓棒話難逢快便不妨商量若有喫棒分石橋元不在天台若無喫棒分西山走入滕王閣深藏主有逸格超宗眼目道聚一年餘能甘淡泊當此秋清將意行天台出門三步或若石橋成兩截西山頭倒卓則知萬壽初無剩語示智上人江西自八十四人以還一時之盛號稱法窟良由馬師畏簸箕之譏趨遠大之域奔軼絶塵不可控勒所謂馬駒踏殺天下人者是也英靈間出項背相望代豈乏人邪如所示即心即佛非心非佛之旨平如鏡險如崖使能過此兩關掉臂徑去亦不辜自法窟中來也示巽上人梅澗號一花開大地春一漚生波瀾始苗從地斷濁自源頭有能不動一塵不撥萬象向冷冰冰處發揚本地風光若是浮逼逼地落二落三則不堪為種草巽上人無從事枝葉須直截根源果熟猿重處知有真實現前水落石出時自然光影俱盡還我核子來大梅機關太露瞪目不見底雪老窠臼猶存須信少林一枝曹溪一派不出吾掌握中矣倘或望林止渴口裏水漉漉地謂是誤他三軍又爭怪得示鑑藏主如來非智巧智者以如來為宗祖師非妙得妙者以祖師為旨宗旨一定源委自分所以永嘉大師初到曹溪振錫繞牀而立可謂師子咬人曹溪云大德自何方而來生大我慢直下如金翅擘海小留一宿平地陷人後人謂之定宗旨於曹溪良有以也鑑藏主吾鄉之英宗旨定來久矣懷藏至鑑鑑在機先顯發大用用超格外以至東家杓柄長西家杓柄短無不知之造詣既深羽翼既備未有長住而不行未有長行而不住欲識佛性義當觀時節因緣建立法幢播揚宗旨茲其時也清厲之瑟朱絃疏越一唱三嘆當有擊節賞音者矣示牧維那目前無法長劒倚天意在目前千雷吼地搆得搆不得未免喪身失命此事大包法界細入鄰虗非見聞覺知所通非世智辨聰所了圓悟道不可説時便有不説時便無妙喜道不可蒲團上打坐時便有跳下禪牀時便無者裡翻却二老舌頭方知面前有條活路十二時中折旋俯仰酬酢事機入林不動草入水不動波雖在城市中不為聲色之所籠絡雖在富貴中不為榮華之所移換所以道就內打出則氣力壯就外打入則氣力弱正當紛拏轇轕之時只消輕輕捩轉便見千變萬化皆非外物既到者般田地若作奇特想未免坐在解脫深坑此乃無盡藏三昧門須是具勇猛身心立堅固行願視佛祖如生冤家聞禪道如風過樹直得十字縱橫圓通自在千差合轍萬派朝宗回看從上以來一機一境趙州庭柏祕魔擎杈無業莫妄想洞山麻三斤是甚麼熱碗鳴聲牧維那鋭志此事特求法語為入道警䇿先德道但辨肯心必不相賺示暉書記有魁壘英特之資負豪邁激烈之志氣吞萬衲眼空群象凡世間文字諸子百家無不周知至於祖師門下一著或邈其端倪者為何蓋習氣未除蹊徑已熟故也香林四十年方成一片長慶往來雪峯玄沙二十年只看箇驢事未去馬事到來趙州道我在南方除粥飯二時外未嘗雜用心古人酷為此事其矻矻如此五祖云參禪須是悟悟了須是遇人始得打頭不遇作家到底翻成骨董鵝王擇乳素非鴨類金翅擘海直取龍吞若眼目不精明源流不甄別往往錯認驢鞍橋作阿爺下頷昔黃龍南會雲峰悅于西山禍事禍事南從泐潭澄澄乃雲門之後悅云雲門如九轉丹砂點鐵成金澄公藥汞銀徒可玩入鍛則流去著甚死急是時黃龍怒甚蹉過真藥明日悅謝過前箭猶自可又曰雲門氣宇如王甘死語下乎澄公有法授人死語也後箭射人深南云如是則誰可汝意者著了也悅云石霜楚圓手段出諸方莫謗石霜好繼而慈明領福嚴南在座下夜聞小參貶剝諸方多泐潭密付之旨遂就入室曰某甲望道未見比聞夜參如迷行獲指南之車欲求法施使盡餘疑理能伏豹慈明因問書記學雲門禪必善其旨如放洞山三頓棒應打不應打通天作用南云應打敗也慈明色莊聲厲曰才聞棒聲便是喫棒則汝從朝至暮聞鴉鳴鵲噪鐘魚鼓板之聲亦應喫棒龍頭蛇尾又曰趙州勘婆話試指其可勘處至竟為人為徹南不知答老鼠入牛角慈明詬罵之殺人見血南云正以未解求決豈慈悲然邪見機而變慈明笑曰是罵邪放去較危收來太速於是南公失聲道泐潭果死語也眼花山影轉遂出偈云傑出叢林是趙州老婆勘破有來由併贓捉敗箇是本色道流遇人者如此師家若無向上巴鼻何以驗其參學邪暉書記資稟不凡蘊藉渾厚相從湖寺勉歸記司器識過人遠甚歲寒之義可掬祖師門下鍋兒大小杓柄短長固不在言厚藏深養更宜持久雖是鍛了精金至於百鍊繞指更須入爐異時光明發現作大佛事肯多讓古人哉示寶日上人寶非寶日杲杲上上機無處討赤水求來何太狂荊山覓得苦相惱不惱不狂排夜光險惡道中為津梁余因閲明覺此語忽寶日禪人來前笑曰此正與寶日名字符合但乞書此以資警策南山曰書則不辭禪人要須知其所立名而求其所以名之之實方知飛猿嶺峻未嘗負人禪人腳前腳後忽為寶光日光一爍心路絶伎倆忘不特無負此嶺亦無愧古人矣示無波居士李新恩釋迦不出世四十九年説達磨不西來少林有妙訣是以佛子出興提持向上一脈子如塗毒鼓聞之者喪身失命如猛火聚近之者燎却面門祖禰不了殃及兒孫德山入門便棒臨濟入門便喝正是依草附木滅胡種族何況住心觀淨舉心外照攝心內澄凝心入道總是無風匝匝之波我此一門只貴利根上智領之於一言之下若恃世智辨聰縱令通得一大藏教乃至九經十七史諸子百家只贏得口頭滑於本分事遠之遠矣士大夫有留意於此者多謂佛道懸曠久受勤苦乃可得成又謂千生學威儀萬劫學細行如何博地凡夫便得入手此皆自推一座須彌山一障障了豈不見黃山谷道人問道晦堂因論吾無隱乎爾山谷於是瞥地張無垢居士初見靈隱明善權清久之不契及登妙喜之門因論但知格物不知物格頓悟厥旨看他機投箭直有受斤不動之質方能當運斤成風之手世出世間得人憎無出者些子如水行地中無往而非水若謂水專在是比澄清大海唯認一浮漚體目為全潮若果得此事入手只消一滴便可興波作浪則法性波瀾學海波瀾全卷全舒全起全滅盡浮幢王剎海皆具吾一滴中矣倘或不然只守澄澄湛湛地未免死水裡淹殺有甚用處所以圓悟道我者裡禪如大海相似儞若將得瓶罌來取是儞器量又如此登山須到頂入海須到底須是一回親到龍王宮殿裡始堪商略示印維那昔雲峯悅誦先德如何是佛法大意三問三被打話知金鑾有善大愚有芝憤憤悱悱未萌一念已前早被大愚一定及聞大家相聚喫莖語如銀山鐵壁不可端倪夜造丈室大愚曰來何所求云求佛心法驗人端的處下口便知音雲峯若是箇漢何處討大愚邪前輩具上根利性得旨以還深蓄厚養不求聞達霜露果熟迫不得已為人推出則驚群動衆自然蓋天蓋地終不同褪花杏子摘却一動一靜其氣岸過人遠甚吾門大法的非小緣學者起問津一意之難莫如求師之難師家利生接物以壽慧命之難莫如求弟子之難授受之際不苟如此播南印維那朅來南方孤峯絶頂與衆作息根器重厚造詣深穩若不能言者歲晚以其親庭尊年決去江湖志之所在不可遏能於汝言與心親汝行與道合處見難提之於密多如水乳合如珠走盤以印其心方知今生父母須親近從本爺娘在頂門是也示日本舜上人出家乃大丈夫事須具大丈夫氣槩靠者一著子直是硬剝剝地始得才方半前落後則背馳爾從上具大根器有大力量已得要領尚有艱難萬狀捍勞忍苦如曹溪大鑑因聞心無所住徑造黃梅夜半一語相投卷衣而南至啓蒙山本來面目之機發印宗風幡心動之旨殺人刀活人劒信知得處性燥用時爪抹應菴頌云大海波濤濶千江水逆流龍王宮殿裡不見一人遊雖是直截提持終出曹溪殼中不得要入者般行戶貴在脫落情塵不守古人窠臼舜上人由冷泉而登凌霄十二時中卓卓地無虗棄底光陰果然功用盡伎倆忘則知未離本國時山河大地草木叢林又何孤自己既到中國後日月星辰明暗色空又多少誵訛既然如是未可打住直須以浮幢王剎海無邊香水海拈向一毫頭上西天四七東土二三一時勘破始為親到龍王宮殿不同門外遊人偈頌種竹香嚴活葬在南陽知是所知忘未忘猛虎不應餐伏肉聽教風雨細商量送僧歸蜀曾經巴峽聽啼猿萬想千思舉不全一萬里風吹夢轉月明人上錦江船送昭書記歸徑山錯下凌霄恨不忘百城煙水漫茫茫思量六十蒿枝拂鐵打心肝也斷腸看潮怒雷聲撼海門秋知是幾家人上樓眼眼盡隨波浪轉全潮端的屬誰收褙語録路不賫糧笑復歌三更月下入無何太平誰整間戈甲王庫初無如是刀送愚菴和尚赴資福十分消息在竿頭片甲纖鱗未足收怪得一番浮子動西湖明月上金鉤古劒干戈罷却復何言六國風清令不傳猶有當時太平意塵埋三尺髑髏前花翁傳來五葉到渠儂略露些兒便不同自是普通年遠事莫將一樣看春風送祖上人歸蜀只因月下甕吞蛇贏得南來兩眼花換手槌胸應有日知他死欵屬誰家送布袋像與妙峯和尚時在上柏玉几菴百千諸佛豎降旗大法猶懸一縷絲問訊率陀老慈氏只是恰是下生時放牛嗚咿聲斷笛橫時滿目春風不自知腳後腳前者些子入渠群隊聽渠疑拜大梅常禪師塔聲前借路謾經過望却梅林自倒戈八十四人屙漉漉阿師猶更帶誵訛上安晚鄭丞相為免墳地黃檗山中話裴相獨龍岡上憶舒王相公留得溪邊寺千古佳名在鄭鄉送僧歸蜀脫得南方驢馬群相逢無法可呈君看儂百衲袈裟上半是吳雲半楚雲贈蜀相士蓑衣道人夢入東南萬里餘閲人多處定何如緑蓑又裹春風去未必黃金換得渠送蘭與樗寮張寺丞緑葉叢叢間紫莖芳心細細為誰傾不如去入芝蘭室湊得仙家一段清無夢為人徹困有誰知眨得眼來話已遲滿地如今正閙在聽渠寐語住何時宿天衣偶成過鴈曾無影可留不妨寒水向東流千峯一夜撑空立舊事驚翻盡底休覺海諸善友整經好風晴日滿溪山又到桃源盡處還流水落花攔不住幾多春色在人間劒關吹毛不動定誵訛遍地茫茫盡倒戈但見清風生閫外知恩終少負恩多無聞老胡密語已乖張迦葉何曾解覆藏口耳到君俱喪盡又還家醜外邊揚虗舟一從橈下失關津寂寞空橫斷岸濵夜夜蘆花照明月可憐不見謝家人送林上人歸湖南無端活業盡平沉只為當時錯用心歸路又從湖畔過水深不似恨深深送無言和尚赴楓林禍兮不入慎家門除是知恩解報恩只用五峰曾中底要人吐了要人吞月巖光非照境境非存恁麼曾來二十年話到乖崖峭壁處令人特地憶南泉示頭陀過靈隱頭顱如雪困風波未到靈山未倒戈百萬人中笑花眼元來猶有此頭陀贈書華嚴南詢曾不涉途程寫盡山雲海月情放筆看來親到處一場特地又愁生上履齋吳丞相合從龍首便黃扉盡謂登庸十載遲自是袖中霖雨手肯令勳業頌臯夔一新更化改絃初人語歡聲藹道途僧自深禪湖上寺不知身世在唐虞答日本國丞相令公人言千里本同風何似如今一信通萬浪千波渾不涉新羅元在海門東壞菴壁倒籬坍第二籌扶持不起轉風流只因一句隨他語未到吾宗掃土休上秋壑賈丞相以上流清詔歸宇宙全歸掌握中玄機制勝不言功人將富范張韓比何異丹青繪太空力挽天河洗甲兵爭如談笑淨胡塵山東名並山西重歷數從來有幾人趙居士施丹結萬人緣透瓶九轉有餘香閲世情忘有未忘一萬人緣何日了明朝煙水又茫茫送一徹二公再參無際和尚兩公未見無際前謂從本有成話墮兩公既見無際後謂是不同成兩箇明知見與未見時蒼龍終不澄潭臥雲巖晚歸玲瓏巖老兒家有彌天禍口皮邊禪慣賣弄動輒引人入荒草不知兩公竟何意春風又問東南道貧思舊債濟北驢再欲一頓憨作麼當時失却一隻眼賊過關門夾山老後三十年有話在珍重此行休放過送東山源和尚歸閩尋思六十蒿枝拂如何再得一頓喫此是臨濟住後時黃檗棒頭痛的的尋思昔日曾行腳未離南方已先錯此是天平住後時西院清風頓銷鑠此時人是彼時人去時路是來時路老源胸中只自知却道古人恰相似二月江湖春水生拈得烏藤先我行得大愚力黃檗力且聽住後真消息佛祖讚釋迦佛不即此座成等正覺不離此座成等正覺入雪山悟明星知之者必謂以慈示人開空花結空果不知者將謂實有此作皇天無親惟德是輔此亦名言不及處借水獻花不可當面諱却出山相逾重城為何事悟明星自欺謾試問出山何似入山含元殿裏猶覓長安維摩機不可觸病不可醫説黃道黑引蔓牽枝要見衆生不病時觀音聶府博以母在日所奉像請贊大士真慈念群生有如慈母憶其子盡塵毛剎世界海一一具此一念中惟此一念不退轉如子得母亦復然眼聲耳色互三昧情與無情同證入有能不作實證想當知此相亦非實忽若子母不相知大士實相常現前血書心經為圓相色何從眼聲不到耳耳色眼聲血滴滴地出乎爾反乎爾全身不在圈䙡裏師子國相十方國土中應身何彼此春在花月在水要令當處不留情好看翻身獅子子水石上相明月下磐石上以心中眼觀身外相六根互用示慈門無風平地生波浪月印長江風號萬籟隨流入流無在不在百千三昧一毫頭貴價精神賤價賣魚籃相風吹兩鬢蕭蕭起全身已是拖泥水何人領取鉤頭意明明不在魚籃裏布袋像牙關咬定行又行不上布袋緊靠放又放不下知他裏許有甚兜率內院底十字街頭遼天索價四睡圖睡時遞相枕藉醒後互相熱謾笑中有刃用處多姦看來人斑寧可虎斑韋馱天變相橫兩腕中杵現堆雲裏身權中示權處依舊是天人達磨趂得江頭航折葦聽教後面風波起不負梁王所問來只有此心如此水對梁王突出全機賺神光錯禮三拜熊耳月照嵩山雲填溝塞壑無人會天寒京洛雪依然三拜當時有底傳皇道無私太平日行人猶説普通年五祖荷鋤江上青山未老钁頭邊事猶在若能慎初護末未到兩重納敗六祖挾擔柴已落在誰家此行不空來去手中擔子相隨心知應無所住郁山主野水小橋外諸峯凜寒色被驢子一交至今翻不得政黃牛人牛兩相忘又向橋邊去眼明雙鷺鷀無非是熟處豬頭和尚目前機背後底為復神通為復遊戲直令換盡人眼睛亦與懸羊賣狗而併案耳蜆子和尚酒臺盤上和聲突出釣螺江畔撈摝得底是則是以蝦為目不妨用活底祖師意懶殘和尚寒涕無暇收高風自然足客來知不知吾芋恰新熟船子和尚一橈復一橈打著打不著至今華亭上猶更風波惡朝陽摘不斷穿不透寬作程急著手要從破後覓渾崙當陽拈出誰知有對月本無文未曾説一字字生鐵橛欲了了時是了時何須特地尋明月李源訪圓澤相看已瞭然安用頻頻舉長笛不禁聞又隨煙棹去熊公見西山一見能全機隱身定無路遇猶不遇時病在回頭處大道浴湫圖腥風怒濤中信手拏得起觸撥老慈明攛出拄杖子靈照賣笊籬手把長長竹摝籬與爺同樂又同悲輕如毫末重山嶽十字街頭賣與誰大慧佛日禪師聞薰風南來時和贓捉獲向樹倒藤枯處覆水難收勘破元禪楪子飣底青蝦蟆脫得圓悟胸次用底活馬騮橫三尺竹篦氣索列祖翻四河雄辨貫通九流薄四海內外罔不中傷曠百世上下其誰與儔區區作是説者如一塵之微又何能重輕乎山丘妙峯和尚見之目明氣和如春猶據妙峯頂時平等示人望之心折面冷如鐵猶坐蓮峯堂時大默而説奔走龍象鞭斥風霆不約而繩不令而行宜其談笑興起東菴正脈廓清末流之轍至於靈機絶唱不墮常調莫妙乎庚峯定穴者也大川和尚半身握拳透爪有臨濟體裁輪珠示人類大顛風格不欲露全身慣無贓考賊十地吞聲二乘動色聚一世精神而用東山暗號鼓大地波瀾而疏東澗正脈宜乎百川倒流天下暴白如是模寫滄溟一滴傳金襴倒剎竿須是迦葉師兄始得古雲法師叔凱講師請獲旋陀羅尼機輪轉處風雷疾入薩婆若海舌頭不動雲濤翻肆虗空講盡實頭禪以栗棘蓬裹金剛圈陶冶有學之學而披剝萬象發揮不傳之傳而朝宗百川是為北峯真子無愧竹菴嫡孫後二千年是真精進所謂靈山未散之旨至今一會儼然牧長老以其師立菴像請贊不稟釋迦文踏翻華藏界由天台南覺城東提蘇州有常州有立委羽重關劄洪塘硬寨如是三十年起妙喜正派若言老子見青山行人更在青山外謝靈運平生幾緉屐自覺山招我不知身入畫只貪山色好陶淵明和露鋤豆苗不覺日又夜飄然從何來定在南山下許宣平賣薪挂一壺酒全肩擔荷時落日重回首世無相逢人先生不在酒孟東野整襟獨立聽琴人知琴無絃無琴無人知獨立天地間知音復是誰人我擔先我後人為誰辛苦三百六十骨節透頂透底全露窮鬼子妨不下擔將去閬州許居士畫像請贊家在閬城南閲浮生知其如寄腳踏長安市了萬緣齊之一默雅重甘贄風流孤峻龐老標格甘終身於淡泊見古道之顏色故其寓意於物而不留意於物胸中瞭然一點謾渠不得自讚行素長老請無獅子教兒之訣無老貓上樹之機世無所容其拙人或見謂之慈知之已熟畫出何為後三十年揚在𡏖𡒁堆頭便令無光怪發現未免起傍觀按劒之疑端常副寺請本分曾無買賣動輒於人招怪豈知父子之間描畫虗空著彩端常與麼無端直是克由叵耐資壽牧長老請鐵牛去住之機獅子反擲之訣毫芒略露崖崩石裂無些子柔和唯一味生滅電光石火瞥轉玄關千聖頂頭恣興妖孽禪人請冷泉亭放閘換盡時人眼睛見山堂看雲甚處討他巴鼻認得完全是則未是手中黑竹篦不能打得儞胡亂三十年全無巴鼻叨居六七剎無補宗教翻著梵志襪疑之者多倒用司農印識之者少出嶺既不能跂步玄沙入嶺又何敢追蹤雪老上人擔頭不堪泊蠅也能帶得老僧去那逢人展似即不無若謂起楊岐正宗疏東澗正派且莫謗渠好北山雲擁千巖秀西子湖平萬壑流水石光中間送目無邊剎海一毫收印維那請眼看東南意在西北毗盧印倒用輥動古井蓬塵興化棒不施撒下青天雨雹騰身一擲而抹過萬仞龍門掉臂徑去而何有連雲棧閣祖師心印誰是親傳麟兮龍兮崢嶸頭角小佛事無準和尚入祖堂提密菴破砂盆用破菴沒巴鼻清涼山上白浪翻空海門國內紅塵競起直得錦鏡光寒龍淵鼎沸佛鑑禪師從來不受安排元本亦無位次是則是到處去來不如者裡艮首座秉炬艮為山離為火六十五年卦文方破艮首座而今不用東卜西卜從生至死擲下火只是者個則法事起骨無中唱出傾盡陀羅尼門句後不來朴碎劫初鈴子直得灰寒火冷玉振金聲唱教門中則不無闍梨衲僧門下未會出身路畢竟如何西風一陳來落葉兩三片應上座秉炬風雨應眼時如千日猶是目前不了應耳時若空谷正是鬼家活計應上座瞎却眼聾却耳和雨和風那下行別有神光照天地圓上座秉炬以火把打圓相云圓陀陀光爍爍擬即乖動即錯直饒未點先行也是草繩自縛何故猛焰不容蚊蚋泊道上座秉炬我喚作火汝不得喚作火道上座道道擬議不來髑髏穿過平上座秉炬平不留險非取脫體兩忘猶是死句石火機前眼豁開便是熏地炙地處元西堂秉炬中死號西山東行西行築著磕著平地一交虗空撲落便是鍛了精金更看末後入火一著如何是末後著北海蓬塵生西山頭倒卓淨藏主秉炬真淨明妙靈通虗徹了知大藏小藏如説而行掃除是病非病如行而説淨藏主能剔脫平生火種擲下火徑山為汝點發四明制置黃大卿起棺過湖亭去年來時節十洲盡是春風士農工賈皆和融今年去時節四海渾是秋色城市山林皆慘惻某官平生心存王室一代德尊士林入則朝行以道致君于堯舜上出則方面以仁及物在龔黃前豈知天上樓成又見鄮山人去畢竟此心即佛從來靈骨已仙大道本無門去路一身輕似葉三山元不遠高名千古重如山樓頭畫角聲殘湖上涵虗亭近移身換步一句如何剖析判府侍郎歸去來兮天連水碧為皇女周漢國端孝公主撒土見身無實是佛見了心如幻是佛了了得身心本性空斯人與佛何殊別新薨皇女周漢國端孝公主入自受用三昧元自修行中來與先佛有大因緣破微塵出大經卷以恪謹而行己志以婉愈而奉慈闈貴長依日月之明何早誦露電之偈生榮死哀本無二致人間天上同具一真出於機入於機移身換步歸第四天生於土歸於土轉女成男頓超十地只今全體承當當陽如何蓋覆端孝公主彩幢仙珮且歸去有意明時却再來題跋跋多心經心外無法是大神呪法外無心是大明呪不在內不在外有能心法兩忘而見言外之意所謂是無上呪是無等等呪者也跋周居士金剛經解鈔解疏疏解經覺如居士窮諸家疏鈔掇而拾之且道經解甚麼忽若一語不玄謗斯經故跋圓覺證義諸經各標時處唯圓覺一經不標時處何耶淳祐丁未夏覺如居士書來求圓覺講義跋是時千丈巖主方與湖海衲子作安居佛事未暇也友上人歸日試問居士所集講義已到第幾菩薩題雙帆出浦圖江頭水如天不見人上華亭船挂帆來何處又無人喚奯公渡或作境話會不作境話會姑付三十年後與人點眼跋宏智禪師墨迹宏智暮年真帖筆力遒徑語意縝密不輕來學宜其起洞上之宗寂用無礙處後來與天地萬象無平出一路要見古佛過去久矣跋意一徐相公與成上人偈後萬物叢中著得隻眼如同木人百草頭邊驀鼻拽回可謂善牧意一言下大有深意能於老盧不識書處善財不動步時心領意解平生參學事畢跋通菴王太尉維摩經頌維摩會上三十二義墮與不墮至竟不出一默通菴居士不動干戈摟其窟穴暴其醜惡雖然盡法無民題江山萬里圖盡大地是沙門一隻眼孤逈逈山不是山澄湛湛水不是水無目前法有目前意才起一念及路旁堠子何止白雲千里萬里題佛照與遁菴書後中有三佛議論又有虎丘隆和尚事山前一片間田地不三世而禍起蕭牆遞相割據為憐松竹引清風宜也原其枝分派別實於看腳下一語不獨當時誤人坐在半途亦負纍後代兒孫多少沒地頭在所謂滅吾宗者旨哉題王龜齡墨迹同嚴首座竹賦龜齡諱十朋號梅溪石橋未到已先知熟處難忘入境還如入夢時切忌寐語僧喚我為嚴首座不可諱却前身曾寫石橋贓物現在噫一念見道三世情盡誦梅溪居士之作可知前身後身一夢兩覺天台月落鴈山春曉即此夢覺無二無別人或不然聽竹君説題傳燈三十五祖圖後形興未質名起未名形名既兆已是描畫虗空了也何況心心相印法法相傳大似重施五彩然一人唱之一人和之禍事禍事豈止西天此土而已將見窮塵毛剎海亘千萬億劫無有一人能免其負纍者明眼衲僧若開此卷向釋迦未出世達磨未來時著得隻眼方知二千年事盡在今日跋海佛禪師語録石溪未離雲頂行腳未到處要須到既見雲居開口不得處要須道執侍半年如矢在弦上知而不自發至龍袖拂開之機而箭在的中發而不自知雖然早年見松源于北山下是此話已行若謂開得口後方有此録腦後猶欠石溪一錐在遺表臣僧廣聞一介草野出自遠方幸際明時復遭聖世然五山勑命臣領其四乃者伏蒙陛下念臣衰老錫以徽號憐臣食衆蠲免和糴臣之榮遇可謂無涯矣雖歷百千萬億劫不足以酬陛下之洪恩演八萬四千偈不足以盡微臣之懇切臣今疾病危惙命在頃刻不能多辭以謝惟願聖算與天齊休為民父母為佛金湯是臣禱頌之忱下情無任瞻天望聖激切屏營之至塔銘中太夫直寶文閣提舉建寧府武夷山沖佑觀林希逸撰景定四年六月十四日徑山佛智禪師廣聞示寂遺奏聞皇帝悼惜賜錢助葬塔在大明山下以大明名菴御書其扁且給田以食守者嗚呼盛矣非師能賢穆陵豈輕𢌿哉師於余為鄉人初得其名於鄭丞相所為偃溪序壬戌還朝始見于京疏眉秀目哆口豐道貌粹然出語有味益敬之東澗侍郎湯公於師尤稔每相與言其賢方聞其病即以書別余與東澗俱為文以奠之東澗筆甚奇南歸五載其徒普暉來溪上乞銘狀曰師候官林氏子世業儒母陳氏夢僧伽振錫入其室娠而生師貌與像肖人曰僧伽再來也劍負未言見佛即合爪稍長誦書如流年十五父母以宿緣俾從小父智隆於宛陵光孝十八受戒具初謁印鐵牛印名具眼深奇之曰法棟也遍參諸老與少室睦無際派追隨甚久卒嗣琰浙翁見于天童針芥相投自知未穩去再見雙徑翁知梅將熟矣迎曰汝來也一夕坐簷間聞三更轉將入雲堂曳履而蹶如夢忽醒翌朝造室翁舉趙州洗鉢話師將啓吻翁扯止之平生疑情篦下氷釋機鋒自是不可當藂林曰有兩浙翁矣紹定戊子四明制閫胡公以小淨慈致之郡有貴公謀竁寺後時安晚當國師以頌馳白即行相苦留之事遂止無何移住香山相功德寺也相還里又移城之萬壽貴卿名士爭先遊從晚每至忘歸為師作序此時也乙巳雪竇虗席制閫顏公以師聞如奏勑下此山給勑自師始上又親灑應夢名山四字以賜戊申移育王辛亥移淨慈時教家有挾坐禪宗上師奏數百言條析明備上是之詔仍舊時璫焰方熾師以理析聞者敬服甲寅移靈隱丙辰移徑山昔寺更兩燼而復始務速成傾漏相仍日費苴補師始至歲仍儉輟衣盂以贍來者厨堂忽敗撤而新獨雄於一寺其有為之功不苟類此辛酉賜號佛智舊莊二所指水為田東餉按籍索租害此寺二紀師為奏免踰年又以和糴病告穆陵雅敬師每請必俞師雖於世泊然而所居利興弊革不可盡書賢矣哉連住八山幾四十年誘納其徒證悟者衆海東夷相叩請書沓至師之道化遠矣病中危坐如常時問疾往來與語不倦將終獨以急明己事為門人誡侍僧求偈麾去益請書十六字而化時方炎夏飛霰紛紛非積行所感乎住世七十五年坐五十八夏其壽若臘與佛日同金書菴名共一明字聞者異之師襟量素宏與人和易所至緇徒雲集敬慕之沒齒無疾聲遽色遇事雖劇處之如如不逼而成隨願必應他人不可學也或疑其主法過慈其弊也弛余曰百丈規則嚴南陽門戶大臨濟峻峭雪峰粹夷教雖不同其道一也師以身率何弛云余雖交師晚而知師深是宜銘銘曰振錫何人再來何故夢覺何分歸遊何處無為有為一手呈露全提半提八會言句我玩我珠無汝喜怒汝傳汝薪自我來去大明峯前遺蛻所寓枯木衆中法髓誰付金字扁題龍君呵護百世之藏與龍共住斯人也無以愧於斯銘也斯銘也無以愧於斯人也竹溪林希逸書徑山暉首座不遠千里來求偃溪塔銘豫老病不能文以詩謝之漢頓首金剛眼要筆頭點妙喜當年竟脫空千里還山無一字乃為不負偃溪翁甲子三月晦日拾遺雪牧整頓蓑衣禦苦寒自家水牯自家看白漫漫處無香草笛弄梅花過別山針惡鉗鎚下現針鋒正眼開時一線通百匝千重俱劄透始知箇是夜深工羲之故居亭前不改晉山河亭下春風屈曲過我自不知賢者事細挼花片付流波蒸籠重重疊疊有來由熱汗通身未肯休直得變生為熟去方知胡餅是饅頭函匱脫體分明類異常自然函蓋却相當衲僧骨董多狼藉收拾都歸一處藏門鈎彎彎曲曲箇形骸曾向紅爐煅煉來觸著上頭關棙子千門萬戶一時開化楞嚴會香燭二椽燭爐香夏九旬二千年事向誰論人家十萬春風裡盡是靈山會上人玉磬輕敲紫篆清金蓮花綻燭熒熒從教一百二十日散作滿天星斗明終
