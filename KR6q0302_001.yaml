body:
  text: 佛智禪師初住慶元府顯應山淨慈禪寺語録侍者如珠編師於紹定元年七月二十四日入院指三門云不落化門掃除露布擬覓行蹤鐵蛇橫臥佛殿世尊三昧迦葉不知迦葉三昧阿難不知只今禮拜燒香且道是何三昧喝一喝拈制府帖行摩竭令全憑者箇用魔王印亦憑者箇只者箇是甚麼度帖云公驗分明拈法衣提持也提持不起絶毫絶釐抖擻也抖擻不下如山如嶽噁抹過小塘袈裟角指法座目前機向上著掉臂因行傾湫倒嶽須彌燈王踏不著遂升座拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲恭願聖恩溥洽遍十方無量剎塵睿算無疆過三大阿僧祗劫次拈香云此一瓣香奉為判府節制尚書洎闔府尊官增陪祿算次拈香云此香輕如山嶽重似毫毛大江已南天台已北本於此根於此有來由無香氣供養前住徑山興聖萬壽禪寺特賜佛心禪師浙翁大和尚用酬法乳趺座云衲僧相見啐猶乖達士相逢握鞭回首有傍不甘底麼致將一問來僧出問云諸佛出世説法度人和尚出世有何方便師云知恩者少僧云恁麼則粉骨碎身師云莫鈍置僧云只如三聖道逢人即出出則不為人意旨如何師云斬釘截鐵僧云既出因甚不為人師云賴是禪客有此一問僧云興化道逢人即不出出則便為人師云截鐵斬釘僧云既逢人因甚麼不出師云須是山僧答你者話僧云正當今日和尚如何為人師云喫棒得也未僧云利劒拂開天地靜霜刀舉起斗牛寒便禮拜師乃云智不到處道著頭角生意在目前非耳目所到放過一著坐斷十虗卷舒立方外乾坤縱橫挂域中日月全殺全活有放有收正與麼時還當得出世邊事也無慣從五鳳樓前過手握金鞭賀太平敘謝不録復舉寶公和尚令人傳語思大禪師云何不下山教化衆生目視雲漢作甚麼思大云三世諸佛被我一口吞盡何處更有衆生可以教化師云思大一條脊梁硬似鐵被草繩輕輕一絆絆倒至今草窠裡頭出頭沒當晚小參釋迦不出世稱尾無星達磨不西來尺頭有寸峭巍巍處平坦坦平坦坦處峭巍巍拈拄杖云拈起也地轉天回放下也風行草偃總不與麼時如何靠拄杖家住東州復舉藥山和尚小參示衆云有一句子待特牛生兒却向你道時有僧出云特牛生兒也請和尚道藥山云將火來僧抽身歸衆師云藥山探頭太過傍若無人者僧眼目精明見機而作若是一句子猶欠悟在上堂拈拄杖云若作一句商量淨慈謾諸人不得不作一句商量諸人謾淨慈不得卓一下事到理到天平地平因甚主山高案山低上堂楊岐眼裡睛臨濟頂中髓一不成二不是點著不來白雲萬里上堂壁立千仞險拍禪牀左邊南院和尚過者邊著石火電光鈍拍禪牀右邊臨濟大師過者邊著摩訶衍法離四句絶百非喝一喝三段不同收歸上科中秋故舊至上堂若論此事如十五夜月相似猶是滯在目前光不透脫直下頂門𣤩瞎黯黑乾坤不妨於衲僧門下有箇相見處為甚如此是我山中人愛説山中話上堂森羅及萬象一法之所印晝見日夜見星松本直棘本曲如何是一法一冬二冬叉手當胸上堂德山入門便棒蔗咬甜頭臨濟入門便喝飢過心荒拈拄杖云二大老性命只今落在淨慈手裡若不放過盡大地瓦解冰消靠拄杖下座上堂如佛見佛佛無異見如法説法法無異説觀音菩薩將錢買糊餅因甚放手却是饅頭喝一喝蠲免墳事上堂舉古德道此事如一片田地相似四至界畔契券分明一時分付諸人了也只是中心樹子猶屬老僧師云古人但有受璧之心且無割城之意爭知寺是皇朝寺僧為宋地僧無私王化裡依舊好山青佛成道上堂錯錯六載草繩空自縛了了開得眼來天大曉古今天地古今日月古今星辰拍膝云劒去久矣切忌刻舟上堂語是謗默是誑語默向上有事在淨慈直下為汝説破若也會得向北黃河倒流若也不會城南草作黃色浴佛上堂馬腹驢胎輥過來通身滿面是塵埃謾將香水年年洗有人續得末後句許你親見釋迦老子結夏小參無為無事人猶是金鎖難何況立解立結立修立證無途轍中翻成途轍無計較中翻成計較大似好肉剜瘡枷上著杻且如何免得此過若不入水爭見長人復舉藥山和尚久不上堂知事請為衆説法藥山云槌鐘著知事鳴鐘大衆齊集藥山歸方丈知事云承許為衆説法為甚一詞不措藥山云經有經師論有論師爭怪得老僧師云絲不如竹竹不如肉還他藥山老人只如末後恁麼道時如何猶把琵琶半遮面不令人見轉風流次日上堂大無外小無內南來北來東倒西擂不著佛求不著法求山中九十日雲外幾千年謝新舊知事上堂玉以火試金以石試水以杖試劒以毛試淨慈不恁麼雪後始知松柏操事難方見丈夫心上堂聞佛生冤家悟道染泥土一日鉢盂兩度濕人人欠他一點不得總似今日老胡有望道士至上堂道生一一生二二生三三生萬物盡大地十箇有五雙向者裡不疑只如老子化胡成佛何不化胡成道畢竟誵訛在甚麼處此去切忌舉著上堂難難幾何般易易直下是也不難也不易常憶江南二三月鷓鴣啼在深花裡上堂拈拄杖云恁麼會便不是了也乃橫按云不恁麼會時如何靠拄杖洎合停囚長智中秋上堂八月十五月圓當戶撩起便行掀翻露布長空雲暗雨漫漫一段光明無著處上堂捻聚也在我放開也在我三九二十七菩提涅槃真如解脫拍膝云明明向汝道尚自不會何況蓋覆將來開爐上堂古佛心只如今拈拄杖卓云繩牀震動火爐震動靠拄杖糊餅裡討甚麼汁上堂巢知風穴知雨衲僧未舉先知淨慈不敢相許何故發機須是千鈞弩至節上堂説法不應機總是非時語長至令辰天清地寧伏惟知事為衆竭力首座大衆心無二用各各應時納祜不存窠臼慶無不宜左之右之管取十八不共上堂説不到處一句是一句行不到處一步是一步行到説到一狀領過缺齒老臊胡嵩山破竈墮上堂拈拄杖云若喚作拄杖子埋沒己靈不喚作拄杖子辜負先聖擲下拄杖豈不見雲門大師道一大藏教只説者箇歲旦上堂元正新改旦舉則舊公案料掉沒交涉閏年春色晚上堂欲見太平須撥亂乾坤欲求知己須掀翻海嶽淨慈沒者間工夫端坐受供養施主長安樂閏二月上堂大盡小盡三年一閏全提半提眼上安眉有誵訛沒巴鼻放過一著落在第二上堂從來共住不知名漆桶漆桶任運相將只麼行只恐不恁麼自古上賢猶不識癩兒牽伴造次凡流豈可明賴有者一句上堂從上已來一人傳虗萬人傳實便是棒頭喝下截鐵斬釘也只屙漉漉地乃竪起拂子云者箇因甚却到今日解夏小參佛法二千年毫髮不移山中九十日終始無間窮十方三世盡此土西天一切處不留一切處成就何必南詢在在覺城東際不勞彈指日月樓閣門開衲僧門下未為極則若是箇漢不墮時人功幹不涉諸佛階梯畢竟如何拍禪牀云一鏃破三關分明箭後路復舉巴陵和尚問僧云遊山來為佛法來僧云清平世界説甚麼佛法陵云好箇無事禪客僧云早是多事了也陵云上座去年曾在此過夏來僧云不曾陵云與麼則先來不相識下去師云巴陵可謂孟嘗之門者僧亦自慣能作客進則進退則退直是賓主諧和只如巴陵道與麼則先來不相識下去意在於何三盞酒裝公子面一枝花插美人頭上堂馬祖升堂百丈卷席淨慈看來寸不如尺上堂雲門放洞山三頓棒嚼飯餧嬰孩黃檗打臨濟三頓棒按牛頭喫草只今不犯絲毫有箇方便良久云大事為你不得小事自家擔當至節上堂群陰剝盡一陽來復拈拄杖云拄杖子隨鄉入俗卓一下六六不成三十六上堂舉一明三問十答百風塵草動剔起便行一箇箇謾他一點不得伸手云我手何似佛手除夜小參一塵入正受乾坤寂爾諸塵三昧起世界崢嶸便見年窮歲盡物換時移東村王老夜燒錢張公喫酒李公醉直下大機頓發不妨正眼流通正與麼時還有物不遷義也無喝一喝復舉古德云我若向你道又怕禿却我舌我若不向你道又怕啞却我口還有為人處也無師云説也説了注也注了意圖為人却成賺人歲旦上堂昨夜送殘年今朝賀新歲無量法門百千三昧拍禪牀云又是從頭起謝新舊兩班上堂祖令當行全機穎脫東過西西過東放則總放收則總收比如馬前撕撲相似山僧只管看佛涅槃上堂諸佛不出世四十九年説莫謗釋迦老子好諸佛不出世亦無有涅槃莫謗釋迦老子好有問今日因何特地莫謗釋迦老子好上堂拈拄杖卓一下云果滿菩提圓又卓一下花開世界起為復神通妙用為復法爾如然連卓二下將謂春歸無覓處不知移向此中來結夏上堂終日圓覺未嘗圓覺開眼溺牀具足圓覺住持圓覺死水淹殺何也我王庫內無如是刀謝都寺夏齋上堂一句子百味具足盡情拈出供養諸人不是東山鐵酸豏亦非楊岐栗棘蓬顧視左右云今日供養何似昨日上堂舉雲門因僧問如何是諸佛出身處門云東山水上行後來圓悟和尚云若是天寧即不然如何是諸佛出身處薰風自南來殿閣生微涼師云恁麼會去見雲門則易見圓悟則難不恁麼會去見圓悟則易見雲門則難今日有人問如何是諸佛出身處只向他道初三十一中九下七開爐上堂三乘十二分教大似説食教外別傳正是畫餅端的要應時如風應機如電切忌暖處商量上堂才有所重便成窠臼卓拄杖云山僧只管打開諸人只管坐斷暫時安在暗窗前明日與君重計算靠拄杖下座元日上堂新年佛法有一舉四十九新年佛法無東壁挂葫蘆今日重關還巨闢幾多春色滿江湖佛涅槃上堂四月八日生二月半入滅雖然生滅元空正是全提時節珊瑚枝枝撑著月住慶元府香山智度禪寺語録侍者如珠編佛殿雲門行棒不可放過香山禮拜放過不可從來獻佛不在香多踞方丈要入香山室須是香山人未跨門時攢眉回去拍膝云為汝保任此事拈府帖箇是大丞相只今與新香山同入神通大光明藏底消息若是沒量大人切忌語脈裡轉却拈山門疏叢林紀綱衲僧巴鼻詞鋒若差鄉關萬里指法座未舉步前踏著未開口前道著道著踏著四海浪平百川潮落當晚小參大道只在目前明破即不堪要且目前難覩未在更道欲識大道真體切忌跺跟不離聲色言語果然從上以來若佛若祖無途轍中翻成途轍無露布中翻成露布新香山有條活路要與諸人共行卓拄杖一下謝詞不録復舉南泉和尚云老僧自小牧一頭水牯牛擬向溪東放不免食他國王水草擬向溪西放不免食他國王水草不如隨分納些些師云大小南泉坐在者裡何如東過西西過東不妨水雲自若忽若有云也跳南泉不出只向他道非汝境界上堂居一切時不起妄念與麼與麼於諸妄心亦不息滅不與麼不與麼住妄想境不加了知與麼中却不與麼於無了知不辨真實不與麼中却與麼拍禪牀不因樵子徑爭到葛洪家上堂富貴却易雪中斷却娘生臂貧窮却難覓心無處更何安難難夜來風色緊孤客已先寒上堂香巖門下無禪無道只有一座大蓬山來者一一平分破忽有人問一座大蓬山爭得人人周足只向他道恰好保福介石和尚至上堂徑山末後句開口成露布拈拄杖云香巖拄杖路見不平噁同參面前幾乎錯舉靠拄杖下座聖節上堂盡力道不得底句不在天台定在南嶽山林千載一時分明拈出天台華頂秀南嶽石橋高除夜小參一法若有山河大地平沈萬法若無森羅萬像顯煥舊歲今宵去去去實不去新年明日來來來實不來擊拂子云盡向者裡一時擊碎了也一法萬法新年舊年大地全收千差一舉絶去來沒回互回時更相涉不爾依位住復舉趙州因僧問毫𨤲有差時如何州云天地懸隔又僧問毫釐無差時如何州云天地懸隔師云肥不露肉瘦不露骨歲旦上堂達磨西來是箇賣卜漢為汝錐破卦文至今未有人斷得香巖新年頭拈拄杖云試為斷看天地合其德日月合其明卓杖三下却是地天泰卦雖則內卦已明更求外象拄杖子莫順人情莫順人意又卓三下向下文長吉無不利聖節滿散上堂雲從龍風從虎聖人作而萬物覩須彌槌虗空鼓而以音聲為佛事拈拄杖云更看拄杖子作云何梵去也卓三下上來講讚無限勝因上元上堂百燈千燈從一燈起有處動地放光無處放光動地問訊燈明如來慣打者般行市浴佛上堂佛身無為不墮諸數且道作麼生浴若人道得可謂知恩報恩脫或未然隨汝世諦流布結夏小參安住如來圓覺伽藍黑牛臥死水遊戲文殊大人境界癩馬繫枯樁中道不居二邊不立入林不動草入水不動波無異狐貍渡水有甚快活直下掀翻大海要覓知音喝散白雲始張意氣何也不入虎穴爭得虎子復舉古德云我若全舉宗乘汝諸人向甚麼處領會所以古今獨露隱顯無方師云曙色未分人盡望及乎天曉也尋常次日上堂十五日已前走殺闍黎十五日已後縛殺闍黎正當十五日如何從前汗馬無人識只要重論蓋代功上堂會得成障礙不會不自在山僧自小不曾學脫空會與不會為汝一錘粉碎擊拂子下座上堂五日不升堂三八不入室供是衆人辦飯是借米喫一夏以來打淨潔毬子要且不曾錯誤諸人一絲毫許還知麼雖是善因而招惡果上堂達磨未來東土官路少人行皮髓分張之後私酒多人喫東頭賣賤西頭賣貴住住近日王令稍嚴不許攙行奪市上堂炎炎普熱紛紛下雪百丈耳聾黃檗吐舌中秋上堂拈拄杖云我若拈起汝便向未拈起時作道理腦後箭我若不拈起汝便向拈起處作主宰眼中添屑卓一下一片月生海幾家人上樓至節上堂便恁麼散去已是俗氣不除那更説佛説法雪上加霜拍禪牀起云且救得一半上堂舉芭蕉因僧問如何是透法身句蕉云一不得問二不得休僧云某甲不會蕉云第三度來與汝相見師云芭蕉與麼道且道答者僧話為者僧説鴛鴦繡出從君看不把金針度與人歲旦上堂新年頭舊年尾第一句下明宗旨三世諸佛不知有是第二句貍奴白牯却知有是第二句且如何是第一句惱亂春風上元上堂風瀟瀟雨瀟瀟黑漫漫明皎皎過去燈明佛面皮厚多少慶元府萬壽禪寺語録侍者光從道鑑編佛殿者一坐具地阿誰無分釋迦自釋迦彌勒自彌勒且還聞上座全放全收去也指法座向下轉去誰不知有向上轉去如十日並照若是覆盆之下爭怪得山僧上堂六祖不會誰云卞璧無瑕纇達磨不識生鐵蒺藜當面擲碓搗磨磨風吹日炙無位真人汗滴滴因池鰻現上堂拈拄杖云是則如龍無角非則似蛇有足平地上走殺多少人見也見得識也識得萬壽道不是不是畢竟是箇甚麼擲下拄杖龍蛇易辨衲子難謾上堂唯一堅密身一切塵中現近見不如遠聞千聞不如一見西風一陳來落葉兩三片上堂青天白日閙市人多鳥道玄途龍門客少目前機頂門竅一語不來三十年後上堂用東山暗號虎頭戴角出荒草唱少林一曲六六不成三十六看不足聽不足斷絃須是鸞膠續冬夜小參聲前一句有祖以來互狼籍末後一機劫空已前早漏逗天不能蓋地不能載顢顢頇頇七花八裂儱儱侗侗收拾不上眼目定動底言下自合知時機思遲回底目前未免蹉路還知萬壽落處麼花須連夜發待曉風吹復舉法昌和尚與感首座喫果子次昌拈起橘子云者箇滋味何似黃龍感云須待嘗過始得昌云驗人端的處下口便知音感云末代禪師多虗少實師云法昌香餌輕拋首座上他鉤線當時待他拈起橘子抽身便起不唯坐斷法昌舌頭亦乃表顯黃龍頭角至節上堂日南長至第一義諦未舉先行討甚巴鼻畢竟如何鮎魚上竹竿一日一萬里上堂佛未出世時會得將經寺裡看達磨既來後會得擔水河頭賣別有生機一著不落今時因甚也道未在臨濟三玄浮山九帶上堂諸人被十二時辰使彩奔齪家老僧使得十二時辰飯飽弄箸趙州雖是傾腸倒腹天堂未就地獄先成結夏小參單明自己不了目前鬼窟裡頭出頭沒若了目前不明自己平地上腳後腳前暗透兩重關不行心處路掃除窠臼別有生涯正是鄭州出曹門料掉沒交涉何況發大機顯大用活鱍鱍如鳥雙翼轉轆轆如車二輪解結兩忘目足並用不啻死水裡作活計若約衲僧門下十萬八千未為遠在復舉巖頭因僧問浩浩塵中如何辨主頭云銅砂鑼裡滿盛油又僧問雲峰悅和尚浩浩塵中如何辨主峰云波斯入閙市師云二老宿有開天下人眼有瞎天下人眼結夏上堂十字街頭大圓覺海逐色隨聲家風落賴討甚西天樣子一任東倒西擂上堂過橋斷橋得路塞路須是千人萬人中羅籠一箇半箇其餘隨分著衣喫飯倚墻靠壁守死而善道者敗軍之兆中夏上堂九旬過半見成公案明眼衲僧打疊不辦萬壽棗子渾崙吞打鼓普請諸人看看看睦州擔板佛心禪師忌拈香三十年已前聞名不如見面三十年已後見面不如聞名一不是二不成盞子裡燒香紫雲靉靆拈起香云見麼面目見在開爐上堂行腳僧無一箇法昌賣弄風流古鏡闊如火爐雪峰起模畫樣撿點將來熱時熱殺寒時寒殺誰知冷灰裡九轉透瓶香上堂非風幡動仁者心動浣盆浣盆非風鈴鳴我心鳴耳漆桶漆桶盡古往今來和泥脫墼有甚麼限還知萬壽落處麼劫石有銷日虗空無盡時聖節啓建上堂調雲門曲發向上機唱太平歌樂無為化卓拄杖一下只將千古意傾盡此時心上堂祖師不來曹溪路上生深棘善財別後樓閣門前草自青直下穿過髑髏換却眼睛欲入洪波裡須是弄潮人聖節滿散上堂盡大地為全機縱橫挂域中日月遍世界為妙用卷舒立方外乾坤正與麼時如何是知恩報恩句黃河三千年一度清佛生日上堂佛未出世時腳跟下好與一錐拈拄杖卓一下豫命唐天口食唐土佛出世後頂門上好與一劄又卓一下唐禮過三唐樂過五結夏小參十方同聚會前三三後三三箇箇學無為切忌喚鐘作甕此是選佛場深坑萬丈荊棘參天心空及第歸有處著你在者些子如水上按葫蘆相似觸著便動捺著便轉百草頭閙市裡逢佛殺佛逢祖殺祖活鱍鱍地方顯其英靈自餘清風月下不知涼兔漸遙洞庭湖邊不知片帆已過懵懵懂懂何足較之何故選佛若無如是眼假饒千載又奚為復舉臨濟因定上座問如何是佛法大意濟下禪牀搊住定擬議濟與一掌拓開定佇思傍僧云定上座何不禮拜定禮拜起忽然契悟師云當時黃檗處喫六十棒底向甚麼處去若盡令而行説甚麼定上座便是傍僧也痛與一頓佛法大意未到斷滅謝夏齋上堂諸方雙行萬壽獨用果然一箇半箇放箸忘恩便知世法即是佛法佛法即是世法其或未然拍禪牀云且放此話大行砌僧堂入堂上堂身淨則佛土淨心平則世界平擡腳不起底遊戲神通下腳不得處縱橫十字龍象蹴踏非驢所堪要知麼保福入僧堂蔣山石溪和尚至上堂破圓悟一關開衲僧活路雲離鍾阜潮打空城盡大地人知是石溪和尚出沒卷舒之用只如擘破面門現大人相又且如何湊泊杖頭曲尺并翦刀須知不是間和尚至節上堂一冬二冬叉手當胸草一草二兩手摸鼻前輩恁麼道萬壽恁麼舉只是諸人不得恁麼會若恁麼會天地懸殊除夜小參鐘聲才動鼓聲催看取如今是甚時閙浩浩中靜悄悄須臾小立是便宜敢問法筵清衆那裡是便宜處擬為説舊年尾佛法劒去久矣切忌刻舟擬為説新年頭佛法見彈求炙又恐早計不如將我五祖師翁所陳家宴重向風前燈下長吹慢打淺斟低唱管顧諸人一上遂舉拂子云囉囉招囉囉搖囉囉送其間忽有人出云長老長老大年三十夜幸是清寥寥白滴滴似者般殘杯冷炙何堪拈出只向他道但管喫果子莫問樹曲六復舉石門聰和尚因僧問年窮歲盡時如何門云東村王老夜燒錢又僧問洞山初和尚生死以何為津梁山云年盡不燒錢師云善行無轍迹善擊無繩縛二大老突出本分鉗鎚不勞餘刃叢林後世追風捕影要見古人遠之遠矣歲旦上堂識得一萬事畢上下四維無等匹張公醉倒街頭元是李公喫酒置之莫問拽占波國與新羅國鬪額是何境界舉頭天外看誰是我般人上堂真正舉揚人荒道絶隨家豐儉尺短寸長衲僧門下有價數沒商量一夜落花雨滿城流水香拈度牒上堂幸自可憐生須要護身符子作麼拍禪牀者裡一提提得人人頂門眼正箇箇肘後符靈方知傾國不換黃金不博雖然畢竟誰是得者良久云但辦肯心必不相賺結夏上堂如來圓覺三月安居良醫之門藥多病甚萬壽通汝活路拍禪牀云鐵壁鐵壁上堂盡山河大地只作一句道却普使有情無情同向句下明宗萬壽緩緩地向伊道不是不是慶元府應夢名山雪竇資聖禪寺語録門人師夔編指三門者裡聚集少時為汝諸人三門頭良久云還知麼寶所在近佛殿前是千丈懸崖後是萬仞孤峰直下若不放一頭低坐者立者轉動不得拈制府帖從上以來無不知有因甚被渠一把把定不把定裂破重關行摩竭令法座千聖頭邊星移斗換八面絶遮攔打鼓普請看升座拈香祝聖罷問答不録乃云大用現前不存知見得路塞路過橋斷橋如月到中峰如風行萬壑人境互顯賓主交參嶺頭多白雲有曲誰聽澗下足流水無絃不彈且聲和響順一句如何主山高案山低謝詞不録復舉臨濟侍德山次山云今日困濟云寐語作麼山便打濟掀倒禪牀明覺和尚拈云二員作者具啐同時眼有啐同時用雪竇擬向飢鷹爪下奪肉飢虎口裡分餐敢道二俱瞎漢若檢點得出許你天下橫行師云毫釐上定當絲髮裡無差莫道二俱瞎漢三箇也有當晚小參住翠峰好住雪竇好大小明覺性命落在別人手裡分疏不下新雪竇要行便行大地從教荊棘生得住且住靈蹤更在猿啼處不是格外機亦非量外事雖然如是蠱毒之鄉水也不可嘗他一滴復舉開山通禪師因僧問如何是密室通禪師云不通風信僧又問如何是密室中人通禪師云諸聖要覩不見師云通禪師鐍太固不知堂奧俱露若要語離巢道須是別有出身一路始得何也只有照壁月且無吹葉風留兩班上堂過去一年復一年未來一日是一日拶到力盡神疲依舊正好著力豈不見道一切自仍舊中得上堂默默無上菩提從此得了了金雞一拍扶桑曉衲僧門下二俱漏逗上堂不用低頭思量難得物有定價錢是足陌九日上堂菊花開時是重陽又言九日是重陽西風無帽落西風索索南山何處是南山蒼蒼恁麼也得不恁麼也得仰面不見天低頭不見地誰知遠煙浪別有好商量上堂適間從僧堂中來人人如白衣拜相少間從法堂下去箇箇如晝錦還鄉若也知得諸人有沒量罪過若也不知山僧今日失利至節上堂拈拄杖云天地與我同根萬物與我一體竪四橫三橫三竪四全無巴鼻討甚巴鼻卓拄杖陽氣發時無硬地謝首座藏主秉拂都寺冬齋上堂好日多同好本多同東山會裡通事舍人今日却在雪竇門下要人吞底是楊岐栗棘蓬要人透底是楊岐金剛圈且道一大藏教中還有者箇消息也無兩處打開一處捻聚聖節上堂河清海晏天平地成佛手遮不得鑿井而而飲耕田而食帝力何有哉合掌云吾禱久矣佛成道上堂雪竇雪寒雪山雪寒悟與未悟時大地鐵一團不妨北斗面南看臘月草五供土地上堂年窮歲盡水冷雲寒靈從何來聖從何起有知音者便謂今日敲唱雙行大與雲門古曲同調只向他道土地前更添一分御書至上堂拈香祝聖罷趺座問答不録乃云大人具大見大智得大用為此一大事顯此一大緣體大道之無門信大方之無外發山川無窮之祕大為特書示文彩未彰已前大作佛事如天普蓋似地普擎遂令入夢之山寅奉有神之筆直得含珠林與祥風競起錦鏡水與和氣爭流正與麼時發揚格外之機上侈域中之大一句如何帝基磅礴三千界聖壽延鴻億萬年臣僧廣聞恭奉聖旨特賜本寺應夢名山四大字宸翰臣僧領衆迎接歸寺永鎮此山升于此座舉揚正法眼藏上祝聖壽無疆臣上感聖恩上感聖恩下情無任感天荷聖激切屏營之至復説偈云含珠林上碧崔嵬曾入仁皇夢裡來今日恩從九天下無邊剎海走風雷上堂達磨九年面壁不敢正眼覷著神光三拜而立至竟何曾踏著覷著踏著彩石渡頭看陳年斷貫索上堂説心説性説玄説妙雪竇者裡是小家惡口學佛學法學禪學道諸人分上是鶻臭布衫秦不收漢不管間來石上從頭數得到清平有幾人佛生日上堂古釋迦出世點胸點肋傍若無人老雲門令行眼親手辦泥裡撼樁用底是銅公塘使底是鐵奉化佛法那時早是與麼了也入鄉隨俗又爭怪得今日卓拄杖一下結夏小參升法華堂未入法華室喫溈山飯不參溈山禪便令一步進得百尺竿頭正好一時揚在千丈巖下茲夏百二十日長期來日當獻最初供之辰移在今夜吹唱不比東山家宴須別作箇管顧拈拄杖云借水獻花借花獻水不妨制禮作樂竪拄杖云還見麼禮云禮云玉帛云乎哉卓拄杖云還聞麼樂云樂云鐘鼓云乎哉從來美食難中飽人若是良馬不由鞭影復舉溈山在方丈內臥見仰山入來溈乃轉面向裡臥仰云某甲是和尚弟子不用形迹溈作起勢仰便出去溈召云寂子仰乃回來溈云聽老僧説箇夢仰低頭作聽勢溈云為我原看仰取一盆水一條手巾來溈遂洗面了才坐香嚴入來溈云我適來與寂子作一上神通不同小小嚴云某甲在下面了了得知溈云子試道看嚴乃點一碗茶來溈歎云二子神通過於鶖子師云神仙祕訣父子不傳溈山帶水拖泥無大人相雪竇道擎茶度水不無二子若是神通未夢見在次日上堂貞女不著嫁時衣好兒不使分時財只如一夏九十日如何排遣拍禪牀云切忌坐在者裡端午上堂舉古有老宿於門上書心字窗上書心字壁上書心字後來法眼和尚道門上但書門字窗上但書窗字壁上但書壁字今日看來一等是隨邪逐惡若無白澤之圖豈有如是妖怪雪竇不然以拂子畫一畫云天行已過使者須知上堂一人所在也須到命若懸絲半人所在也須到失却鼻孔只如無人所在也須到時如何拍禪牀云三段不同收歸上科請監收上堂一番兩番新雨過前村後村年已熟試問蒲團上打坐何如催人打禾穀五祖道底上堂赤肉團上壁立千仞好與三十棒孤峯頂上目視雲霄好與三十棒此六十棒一棒也較不得雖然未必善因而招惡果上堂行棒行喝好肉剜瘡舉古舉今潑人惡水直饒説得地搖六震天雨四花不如歸堂喫茶上堂聞時富貴見後貧窮妙高臺上打得一轉便道山是山飛雪亭外著得隻眼便道水是水殊不知正是東西不辨涇渭不分忽有箇出來道山不是山水不是水時如何學語之流上堂難難幾何般時節難道路難貧窮布施難富貴學道難難難達磨不會大難大難至節上堂物理有代謝時節不相饒西家君子道長東家小人道消有甚麼限拈拄杖云雪竇者裡不然有人會得堂前露柱放光分文不直若人不會壁邊拄杖生節價增十倍卓一下貴買賤賣上堂了了了家近扶桑最先照知知知一雙紅杏換消梨莫莫莫金雞破琉璃殼住住住鳳棲不在梧桐樹過者四重關了五里牌在郭門外上堂不挂本來衣莫行心處路雪竇説一丈諸人行一丈雪竇説一尺諸人行一尺是則是靈利衲僧要且未在何故曹溪波浪如相似無限平人被陸沉聖節上堂客從遠方來遺我徑寸璧中有四箇字字字無人識且道是甚麼字起身立云天子萬年謝牛太尉上堂若論衲僧門下事如兩刃交鋒相似戰必勝攻必取眼親手辦雷動風行具殺活之機人天罔測全卷舒之用佛祖猶迷只如中軍帳內坐致太平功歸何所箭穿紅日影須是射雕人淨慈無極和尚遺書至上堂放出焦尾大蟲咬殺南山猛虎動地號悲風白日無行路笑中擺手出長安拶得虗空筋骨露流水落花攔不住佛生日上堂佛之一字吾不喜聞出商君令道著佛字潄口三日用司農印古人與麼是則是殺人一萬自損三千雪竇普請浴他意在於何良久云皇天無親惟德是輔結夏上堂日消萬兩黃金斷定不著水消一滴不得斫額有分西天禁制令嚴雪竇有箇方便普請山河大地若草若木若佛若祖情與無情出拂子擊禪牀云咸入此宗須知死水不藏龍上堂天平地平河滿井滿臨濟口門窄德山棒頭短鐵蒺藜黃金彈直下來也急著眼看謝衆僧焙經上堂爐鞴之所鈍鐵猶多黃面老子具正遍知只知撒土拋沙欺胡謾漢不知性命落在弟子手中二千年後橫拖倒拽只如雪竇恁麼舉也是把火助熱中夏上堂二千年前舊公案九十日夏過一半雪竇道得十成猶虧一半諸人全身擔荷未搆一半靈利漢不赴兩頭不住中間要且只救得一半且如何是那一半雲行雨施三草二木大慈大川和尚至上堂咄咄咄力囗希大慈知處雪竇不知雪竇知處大慈不知且道不知箇甚麼禪子訝中眉埀上堂極小同大極大同小官路行人少私酒醉人多風前三三兩兩不妨水雲自若忽若下山三步有人問著東山下左邊底須是對他始得若對不得前頭大有事在赴育王辭衆上堂飛雪亭前水妙高聲頂雲雲有出山勢水無投澗聲恁麼會去不隔絲毫若也眼目定動別峰相見慶元府阿育王山廣利禪寺語録侍者復森編佛殿你若坐時我須立我若立時你須坐展坐具云黃面老瞿曇透者些不過踞方丈見法堂悟去望剎竿回去鄮峰未點頭在何故大海若知足百川應倒流拈勑黃龍蟠鳳逸日照天臨如來三昧門寰中天子勑其或見聞不脫觀聽尚留和大地人一時領過拈制府疏用毗盧正印揭仲尼日月一字不著畫八字無兩丿藏主但恁麼拈出指法座先大慧不持寸鐵向者裡布遍地刀鎗先佛照不動一塵向者裡種參天荊棘新育王快便難逢破二作三去也便升座拈香祝聖罷問答不録乃云威音王已前早是不著便何況然燈後麻纏紙裹證據師承三令五申七花八裂千鈞不立錘處進得步拶得行左手斫方右手斫圓萬德不將來時轉得身通得氣閉門造車出門合轍明月照無盡清風來未休謝詞不録復舉阿育王問賓頭盧尊者承聞尊者親見佛來是否尊者䇿起眉毛良久云會麼王云不會尊者云阿耨達池龍王請佛齋貧道是時亦預其數師云神通妙用則不無尊者被阿育王一問直得額頭汗出口裡膠生上堂善言言者言所不能言善迹迹者迹所不能迹明眼衲僧撞墻撞壁既是明眼衲僧因甚撞墻撞壁文殊蹉過維摩詰歲旦上堂拈拄杖云大機圓應大用現前卓一下斬新日月特地乾坤知恩方解報恩謝前堂遠無外上堂多子塔前平分半座險崖句裡水泄不通風從虎兮雲從龍端午上堂五月五天中節盡大地人無不向門頭戶底呪土書符育王門下身心一如身外無餘四明山色開畫圖上堂朝入伽藍暮成正覺俊哉俊哉一念成道三世情盡快哉快哉衲僧門下猶是鈍在何故若是箇漢從娘肚裡跳將出來便解作獅子吼也擊拂子下座解夏小參機不離位墮在毒海撥轉向上竅大地亡鋒結舌點出當頭著豁開金鎖玄路朝遊南嶽暮往天台不動一塵一移一步一夏與兄弟東説西話看翠巖眉毛在麼老老大大有年無德保福道作賊人心虗是精識精長慶云生也看錮鏴著生鐵雲門云關虎頭虎尾一時收直下有人著得隻眼不妨出一叢林入一叢林復舉青林虔和尚到洞山山問近離甚處林云武陵山云武陵法道何似此間林云胡地冬抽笋山云別甑炊香飯供養於此人林便出去山云此子向後走殺天下人在師云青林雖然見機而作盡力𨁝跳未免只在洞山架子下上堂無下腳處拶得一步正是藤蛇纏足無下口處突得一句正是露布纏身一處不通兩處失功兩處不通觸途成滯如何得脫灑去南有雪峰北有趙州重九謝兩藏主上堂人間九月又九日善財去後無消息何止門前草自青黃花滿地成狼藉六祖不會達磨不識大藏小藏以拂子擊禪牀盡從者裡流出臘八上堂入山還出山鐵壁復鐵壁衲僧門下擊拂子云不消一擊黃面瞿曇散宅亡家盡大地人眼橫鼻直喝一喝聖節散上堂六殊勝地無越此山極殊勝八吉祥中唯有今朝最吉祥於殊勝中顯殊勝於吉祥中顯吉祥萬年千載壽一瓣九天香佛涅槃上堂四十九年已是收拾不上涅槃會裡欺得當時無人今日即有明日即無若是育王便與推倒紫磨金軀何也死在弟子手中不為分外謝後堂秀首座上堂控佛祖大機廓人天正眼便恁麼夫入得育王門要見育王人遠之又遠試看海上明公秀何似堂中首座簡上堂牛頭橫説竪説不知有向上關棙興化在大覺棒下見臨濟先師於黃檗處喫棒底道理獅子咬人韓獹逐塊開爐上堂雪峰輥毬祕魔擎杈德山行棒臨濟下喝諸大老何用許多氣力拈拄杖云山僧尋常只是因風吹火卓一下今日失利謝等慈上堂行羅漢慈破劫賊故行菩薩慈安衆生故行如來慈續慧命故行平等慈又且如何嶺雲海月俱耕遍拽杷拖犁卒未休上堂達磨面壁雲門念七玉本無瑕雕文喪德上堂畫龍看頭畫蛇看尾雪山冷坐六年此處無金二兩少林面壁九年俗人沽酒三升喝一喝向道莫行山下路果然猿呌斷腸聲住臨安府淨慈報恩光孝禪寺語録侍者元清淨志編三門南屏山高西湖水急還聞偃溪水聲麼左右顧視云從者裡入拈勑黃坐斷天下人舌頭諸佛不知捩轉天下人鼻孔達磨不識人天儼臨皇帝有勑拈府疏釋迦已往彌勒未生正當今日佛法委在大資相公手中機梭不動文彩縱橫不墮聲前亦非句後但只恁麼拈出貴圖兩得相見升座拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲恭願聖心廣大盡夷夏莫不包容睿算綿長等河沙安可紀極次拈香云此一瓣香恭為中殿皇后皇子公主暨中宮天眷並同伏願福壽高固如五須彌智慧淵沖過四大海次拈香云此一瓣香奉為大丞相樞使國公大參樞使相公同知參政相公並同伏願德尊周召措天下於泰山之安威懾蠻夷復境土於三河之舊次拈香云此一瓣香奉為判府安撫大資相公都運大監殿撰侍郎伏願股肱上聖膏澤下民一日九遷千秋五福次拈香云此一瓣香奉為前住徑山興聖萬壽禪寺特賜佛心禪師大和尚用酬法乳之恩趺座問答不録乃云法爾不爾建立則乖宗掃除則失旨不建立不掃除新淨慈有水船行無水步行借路經過入王舍城南山起雲北山下雨佛法未怕爛却何故九天雲靜封疆闊王道無私掉臂行敘謝不録復舉巨宋太宗皇帝因臥雲菴僧朝見太宗問云臥雲深處不朝天因甚到者裡僧無語雪竇明覺代云難逃至化師云天開地闢日照月臨者僧遇而不遇掣金殿鎖撞玉樓鐘明覺鼓舞盛時如何是今日對揚一句良久云報恩有分當晚小參水歸滄海萬派朝宗月到中天無幽不燭似衲僧行處如衲僧用處明頭合暗頭合盡情打入宗鏡光中爾時雷峰塔與慧日閣交頭偶語不覺不知被鏡光一爍於是議論鋒起統一為多統多為一知他是祖意教意於此光中分疏不下是致永明忍俊不禁為之剖決佛祖要妙非競辨而可求新官不理舊事向下文長付在來日復舉黃檗云自達磨大師到中國唯説一心唯傳一佛以佛傳佛不説餘佛以法傳法不説餘法法即不可説之法佛即不可取之佛乃是本源清淨心也師云黃檗是箇作家因甚作座主見解法即不可説佛即不可取果然以此為極則達磨一宗掃地而盡謝新舊兩班上堂建立法幢扶持法社左之右之風流儒雅全卷全舒珠走盤正法眼藏增高價徽宗皇帝忌日上堂彩儀仙仗五雲間只作先皇舊日看莫道空餘弓劒在威風凜凜逼人寒中殿慶寶蓋祝聖上堂風動幡動非風幡動仁者心動一語歸宗萬國朝風鳴鈴鳴非風鈴鳴即汝心鳴六鰲隨掣三山起豁開頂門正眼提持向上大機騰今耀古絶遮攔匝地普天沒回互一一交羅如華藏界重重無盡若帝網珠意在目前花添錦上數百衲子同聲慶讚半千尊者動地放光頭頭現富壽多男物物藹春風和氣可謂奇特中示奇特事殊勝中顯殊勝因正與麼時如何是報恩一句帝力丘山重君恩宇宙寬復説偈云吾佛廣大華藏海法隨法行隨建立此寶華王獅子座上有寶蓋從天垂古來寶積長者子手持此蓋同供佛佛以智慧威神力一一寶蓋合為一南山去天尺五近王城不異毗耶城彼時心即此時心以此莊嚴作佛事綵幢寶幡雜金碧問見層出生光輝猶如微風吹萎花而復更雨新好者仰觀三千大千界於此蓋中悉充遍一一世界既亦爾線蹊針孔無不然豈止一佛與二佛盡十方佛現其中廣長舌相熾然説萬法一法靡不周皇上心與佛心通皇上壽與南山齊無負此恩與此蓋臣心有如此山爾上堂今日熱似昨日諸人各宜保愛中秋上堂正好修行簷前捧月正好供養水中撈月拂袖便行掉棒打月一即三三即一馬駒踏殺天下人兔子何曹離得窟上堂山前一片間田地將謂忘却叉手叮嚀問祖翁好不丈夫幾度賣來還自買契書是甚麼人作為憐松竹引清風以拂子擊禪牀利動君子上堂如來禪祖師意一不成二不是直下拶得行轉得身吐得氣又何待鼇山店上古佛廟前方始瞥地上堂十字街頭石幢子無你遮護處一聲江上侍郎來無你回避處衲僧家朝出暮入腳前腳後也須子細忽然築著磕著淨慈拄杖別有分付上堂六年冷坐九年面壁碓搗東南磨推西北聖節上堂風不鳴條雨不破塊塵塵剎剎全彰總是大人境界北極高照南山外上堂禪非意想道絶功勳去此二途比如太平時節駕輕車行熟路無往不可要望德山臨濟門下遠矣何也畫前元有易刪後更無詩結夏小參會則事同一家不會則萬別千差同天而天處人而人原夫能天能人者豈天人之所能哉肇法師道則太煞只得八成仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣先儒似則也似猶虧一半南山從來不曾脫空所至以九十日為一夏未嘗錯誤諸人一絲毫許若也會得東勝身洲打鼓西瞿耶尼上堂其或未然長連牀上有粥有飯復舉僧問曹山清稅孤貧乞師賑濟曹山召稅闍梨稅應喏山云清原白家三盞酒喫了猶道未沾唇師云稅闍黎用影身術老曹山用縛虎機雖然且道那裡是他喫酒處次日上堂人有南北道無南北上中下座虗空逼塞其中有一人半人肯去説甚開粥相待南山別甑炊香未為分外上堂召大衆是法非思量分別之所能解三七日思惟是事好不丈夫十萬里遠泛重溟誣罔後世汝等諸人寮舍中來僧堂內去如虎插翼相似却來者裡眼眨眨地欠箇甚麼挂御書華嚴法界正遍知閣牌大機圓應具正遍知大用現前提向上著袖裡神鋒未動目前文彩全彰闡開百千三昧妙門不墮二十四家書法來自黃金殿高垂日月之光照映白玉毫益壯湖山之勝即此華嚴法界何殊寶樓閣前一點水墨兩處成龍二千年事盡在今日且如何是今日事天子萬年端午上堂寫王公符用商君令師多鬼亂藥多病甚南山門下却有一這真言只欲行其所無事即説呪曰牀窄先臥粥稀後坐耳聵要聲高眼昏宜字大彈指一下上堂知見立知即無明本知見無見斯即涅槃安楞嚴破句讀了剛道有箇悟處未免聽事不真喚鐘作甕春草碧色春水緑波送君南浦傷如之何竹原菴主破句讀了剛道有箇見處莫將鶴唳誤作鶯啼南山雖是弓弦上結紐貴圖兩得相見且道誵訛在甚麼處孔門弟子無人識碧眼胡僧笑點頭上堂拄杖頭邊天台南嶽草鞋跟底峨嵋五臺超方衲子便令搆得跨門一機猶隔關在若是三千里外有定誵訛眼目須喫南山拄杖始得何也重賞之下必有勇夫佛心禪師忌辰拈香用東山暗號誑呼盲聾起東菴正派渾無氣息淨慈當時於無氣息處已是自謾今無可酬之恩又無可雪之屈仁義道中不問瓶香楓香一時拈出惱亂叢林無了日謝源靈叟慶雲谷二首座至上堂閙市無人龍門有客漆桶相揩渾無軌則一時輥入草窠中盡西湖之西北山之北還道著接手句麼山上鯉魚南山白額何山雲山和尚遺書至上堂一法若有脫羅籠處萬象平沉萬法若無沒遮護時紅塵滿地如孤雲行空如寒月即水擬從於此覓雲山何啻白雲千萬里中秋上堂水清月現動隨影轉水清月不現背手新羅箭踏翻水碗便行墮在解脫深坑三大老總似閉目中秋坐只知第二月如何是第一月以拂子打圓相云切忌眼花謝日東山垠方菴上堂相逢不拈出猶是東山左邊底舉意便知有又是方菴外邊事南山快便難逢聲東擊西持方入圓貴要諸人知有擊拂子云一點成龍兩處全何如兄弟添十字九月初十上堂九日已無黃栗糕十日依然有黃菊何須九日記重陽黃花開時意自足東籬若謂見南山子已過新羅國冬夜少參聲前敲唱腋下剜襟格外提持袖頭打領不有通天作用未免總涉周由真淨道石霜普會云休去歇去冷湫湫地去是謂二乘寂滅之樂雲門云一切智通無障礙拈起扇子云釋迦老子來也是謂法喜禪悅之樂德山棒臨濟喝是謂三世諸佛慈悲喜捨之樂除此三種樂不為樂也真淨老子以己方人不唯埋沒先賢亦乃失却隻眼淨慈門下無孔笛氈拍板隨分酬唱只貴應時納祜豈不見道飯蔬食飲水曲肱而枕之樂亦在其中矣復舉溈山問仰山云仲冬嚴寒年年事運推移事若何仰山叉手近前而立溈山云情知子答者話不得香嚴云某甲偏答得者話溈山理前問香嚴亦叉手近前而立溈山云賴遇寂子不會師云仰山前不搆村香嚴後不迭店還知溈山年老心孤麼至節上堂日南長至吉無不利凍破泥團花開碓觜臘八上堂言而足終日言而盡道言而不足終日言而盡物道物之極言默不足以載非言非默義有所極者些説話盡大地人無有不知者要見黃面老子直是天地懸殊何也天上星地下木元日上堂盡大地撮來如粟米粒大拋向而前打鼓普請看老雪峰當時向人面前寫了一本曆日天下後世只知夜暗晝明往往蹉過中間事南山何以謝升平今日當陽盡拈出寶祐改元王春書月萬派朝宗千車合轍聖節上堂夫説法者如法而説香祝南山壽比北闕大川和尚遺書至上堂來無地頭大川全在一毫收去無方所靈蹤更在猿啼處虗空迸綻等間換却諸方眼山河起舞撼動天關搖地戶大衆還知澗東末後句麼彼彼三昧彼彼不知此意分明説向誰上堂舉處微和尚因僧問三乘十二分教體理得妙與祖意是同是別微云須向六句外鑑不得隨他聲色轉僧云如何是六句微云語底默底不語不默底總是總不是汝今作麼生僧無語師云者僧好箇問頭又却龍頭蛇尾處微來風深辨墮在句後聲前撿點將來唱教門中則不無若是祖師門下也大遠在謝兩班上堂一喝分賓主照用一時行喝一喝也有賓也有主也有照也有用龍得水時添意氣虎逢山色長威獰上堂習學謂之聞多口阿師絶學謂之鄰是汝見處過此二者是為真過是則是未免和矢合溺何故毗婆尸佛早留心直至如今不得妙解夏小參才有所重便成窠臼拍禪牀云長期短期望雲種樹義學玄學緣木求魚便令窺藩不入據鼎不嘗正是聖量未忘無轉身路三世諸佛口挂壁上六代祖師舌上生茅天下老和尚並在架子下討頭鼻不著淨慈門下如何通信四海如今清似鏡行人莫與路為酬復舉仰山問僧甚處來僧云廬山仰山云曾到五老峯麼僧云不曾到仰山云闍黎不曾遊山雲門云此語慈悲之故有落草之談師云者僧不道不曾遊山只欠慎初護末不能坐斷仰山舌頭仰山不道勘者僧不破只欠些子慈悲不能截斷雲門葛藤淨慈恁麼道不圖打草驚蛇只要後人檢責上堂召大衆祖師意百草頭衲僧眼拄杖頭得路塞路看樓打樓須知衆穴一毫收九月初十上堂採菊東籬下悠然見南山與麼説話十箇有五雙盡道南山錯舉即今人人總在南山者裡且道有何所見若有所見自緣今日人心別若無所見未必秋香一夜衰大拙西堂赴嚴州天寧上堂大辨若訥大巧若拙如説而行如行而説只如行説不到時如何瀟灑溪山一天風月東谷和尚遺書至上堂唱新豐曲風清古格聲前轉調入無生恰應雲門臘月拍無影樹下古渡頭邊要知東谷末後句子須待洞水逆流上堂世事悠悠不如山丘臥藤蘿下塊石枕頭先德道正好喚起了打著甚來由南山道慙愧慙愧若是箇漢自然別有生涯上堂舉趙州因僧問狗子還有佛性也無州云無師頌云忽地晴天霹靂聲禹門三級浪滂澎幾多頭角成龍去蝦蟹徒勞努眼睛住景德靈隱禪寺語録侍者普暉元偉編三門一句語具三玄門一玄門具三要路直下重重透徹許你縱橫十字踞方丈開却門達磨來也拈起拄杖云還喫得棒也未良久靠拄杖云果然拈勑黃示衆云卷動地風雷揭麗天日月盡大地情與無情只眨得眼何故正勑已行拈府疏箇是判府安撫詳定尚書無量妙義門廣大言辭海若也會得當知二千年事毫髮不移升座拈香祝聖罷僧出問云地搖六震天雨四花大衆臨筵請師祝聖師云須彌頂上擊金鐘僧云三春果滿菩提樹一夜花開遍界香師云逼塞虗空僧云欲識佛性義當觀時節因緣時節因緣即不問如何是佛性義師云山僧今日開堂僧云記得肅宗皇帝問忠國師如何是十身調御國師云檀越踏毗盧頂上行此意如何師云皇天無親惟德是輔僧云恁麼則頂門一著輝天地耀古騰今作者知師云古之今之僧云山河增瑞氣草木盡霑恩師云道得著乃云拈花未曾盡十方世界風颯颯地是句非句全提半提甚處得來所以道目前無法一點靈犀自通意在目前九曲明珠暗度不是目前法非耳目所到千車合轍萬派朝宗正與麼時有定古今之機分緇素之眼方知靈山一會何異今日敘謝不録復舉孝宗皇帝宣問佛照禪師云釋迦雪山六年所成者何事佛照奏云將謂陛下忘却師云孝宗皇帝問處當陽乾坤獨露佛照禪師仰酬至化鐘鼎刻銘還知太平無象一句麼但見皇風成一片不知何處是封疆當晚小參德山小參不答話迅雷不及掩耳趙州小參要答話倚天長劒逼人一等是箇時節其奈土曠人稀今夜一塵不動要與從上爭鋒去也良久吽吽復舉乳源和尚示衆云西來的的意不易舉唱時有僧出禮拜乳源云是甚麼時節出頭來便歸方丈師云乳源入泥入水傍若無人者僧一往可觀雖活如死可惜當時一衆若具衲僧氣息才聞舉著各自散去直饒乳源全機也較三十里上堂一升三合拄杖頭邊萬水千山草鞋跟底未言先領誰家竈裡無煙撩起便行是處井中有水莫道空來又空去許多途路不相辜謝府施法被上堂花添錦上幾重重針劄將來不露鋒佛手分明遮不得蓋天蓋地顯吾宗上堂朝看東南暮看西北一見便見一得永得靈雲謾道見桃花臨濟未是白拈賊浴佛上堂有世界以音聲為佛事有世界以香飯為佛事若是大用現前不存軌則靈山今日普與大衆同出隻手同用一機説甚黃面老子便是千佛出頭免者一杓不得擊拂子一下結夏小參盡十方世界是沙門一隻眼頂門上腳跟底時時九夏日日三秋若是行時無説路正在半途説時無行路猶欠一著正當今夜行到説到時如何山僧從來不曾與人葛藤復舉雪峯示衆拈拄杖云我者箇為中下機人時有僧出云忽遇上上機人來時如何峯拈起拄杖雲門云我不似雪峯打葛藤遂拈拄杖云我者箇為中下機人忽有人問上上機人來時如何劈脊便棒師云雪峯葛藤猶可雲門葛藤愈甚若是靈隱則不然忽有人問上上機人來時如何且坐喫茶次日上堂大無外小無內南來北來上載下載忽有一人半人不入者保社靈隱却許他因甚如此老胡有望謝秉拂幹齋上堂聲前收句後殺兩堂賓主歷然少處減多處添一味法門平等平如鏡面險似懸崖若是眼裡瞇𥌛𥉹看即有分上堂祕魔擎杈魯祖面壁官路不行拗曲作直雖然如是一日不作一日不食上堂舉利山因僧問衆色歸空空歸何所山云舌頭不出口僧云為甚如此山云內外一如故大慧云事存函蓋合理應箭鋒拄須還利山始得若是徑山即不然或問衆色歸空空歸何所芍藥花開菩薩面棕櫚葉散夜叉頭為甚如此但辨肯心必不相賺師云言前定旨句後明宗須還徑山始得靈隱即不然或問衆色歸空空歸何所即向他道天高東南地傾西北為甚如此疑則別參中夏上堂百二十日長期今朝恰過半過去己過不用説破未來未至切忌擬議現在無住何須再舉拍禪牀一下須信鑊湯無冷處上堂目前機量外事巢知風穴知雨百鍊鋼千鈞弩擊拂子擬不擬箭後路上堂世界恁麼熱今日何似昨日庭柯一葉落前秋不覺後秋通方達士未舉先知不是俊流徒勞啖謝雲門此軒新承天中際和尚上堂撥開若耶溪上雲高挂峨嵋峯頂月大用不存軌則瞎人何止一城無毫髮間無前後際只今吳越令行惱亂春風未已中秋上堂有則水裡月無則形名兆以拂子打圓相云即此是達磨眼睛亦謂之衲僧頂門竅若也會得二十年到曾與麼來苟或未然吞吐機前二俱失照上堂從上發大機顯大用捩手翻羹轉喉觸諱須知有德山棒無下手處有臨濟喝無啓口分雖然不是苦心人不知九月旦石屏赴護國上堂東去西去腳頭腳尾沒回互南來北來鐵壁銀山盡豁開擬即失動即乖試看楊岐跨驢何似玄沙斫牌上堂法法本來法無法無非法釋迦老子向諸人眉毛上豁開百千妙門眼睫內廣演無量妙義見你諸人不知不覺已入摩竭陀國去也何於一法中有法有不法資壽如菴一都寺施法被升座説偈吾佛舒廣長舌相不即此座亦不離爾時寶積諸長者持七寶蓋而獻佛如菴道人道機熟今亦即色以明心攢花簇錦出新好而以組繡作佛事一一針孔一世界一一花葉一如來森羅萬象影重重莫不一法之所印此座非高亦非廣此被非闊亦非狹舒即大千悉彌滿收入微塵不迫窄譬如隨色摩尼珠是被光明亦如是晝夜常轉如是輪須彌燈王為作證佛成道上堂雪山六年覷不破七處九會説不到合水和泥招因帶果殊不知衲僧門下北斗東轉南斗西移上堂拶得行時方知玄路絶智不到處道著頭角生縱使驅耕夫牛奪飢人食別有生涯猶是不著便不見道才有一絲頭便有一絲頭聖節上堂河清海晏含有象於不言天成地平謝無私於何處靈山蘊界不居萬緣不涉只於出入息間供養承事無量壽世尊而作佛事且道是知恩耶報恩耶元宵謝新首座兼開平西堂赴東山上堂燃無盡燈示無盡意藕絲竅裡逗須彌蟭螟眼中放夜市一等是舊話重行且道是多子塔前險崖句裏良久云東山下左邊底上堂始從鹿野苑大驚小怪終至跋提河伎倆已盡於是二中間未暇鞠勘汝在未嘗談一字葛藤窠裡出頭來黃面老子教他踏著衲僧向上關棙何處有今日上堂舉長慶云寧説阿羅漢有三種毒不説如來有二種語不道如來無語只是無二種語保福云如何是如來語長慶云聾人爭得聞保福云情知儞向第二頭道去也長慶云如何是如來語保福云喫茶云師云七出八沒七縱八橫是則二俱作家不是則二俱漏逗畢竟誵訛在甚麼處良久云欲得不招無間業莫謗如來正法輪端午上堂盡大地是藥善財善採不善用文殊能殺不能活拈拄杖云靈山今日信手拈來應箇時節但是有病之病與夫無病之病普令一箇箇一人人卓一下換骨洗腸眼橫鼻直上堂一句絶離微渾崙無縫罅善財七日尋覓不得趙州五年分疏不下靈山今日快便難逢為通一線六月賣松風人間恐無價上堂佛法無人説雖慧不能了是何言歟菩提離言説從來無得人救得一半盡大地撮來如粟米粒會則便會無端老雪峯打鼓普請看解夏小參文殊三處度夏龍象蹴踏非驢所堪老宿一夏不説話鵝王擇乳素非鴨類靈隱九十日內一且不住本覺二且不守他玄畢竟如何修身鍊行恐辱先也復舉馬大師云一切語言是提婆宗以者箇為主雲門云好語只是無人問我時有僧問如何是提婆宗門云西天九十六種汝是最下種雪竇云赤幡被者僧奪了也師云雲門以勢欺人雪竇抑強扶弱撿點將來總是外道見解次日上堂靈山又見一夏不説陳年舊話青州衫重七斤廬陵米作麼價謝勤維那虎維那泉南持鉢歸上堂海外同歸用亦同靈山有此兩雲峰萬人叢裡高標上只貴重論蓋代功中秋上堂圓處圓還缺缺處缺還圓人爭看今日月只是常年南泉拂袖便行鼓山拂袖歸衆説甚衲僧門下直是重處偏墜薄處先穿謝書記上堂舉雲門因僧問如何是清淨法身門云六不收後來圓悟云雲門只道得一半若問道林如何是清淨法身只向他道一不立師云圓悟與麼也只道得八成靈隱今日更資一路又要二大老兩得相見妙處無私辭鋒可驗十字縱橫文不加點上堂色心不二彼我無差以拂子擊禪牀云主山高案山低森羅顯煥萬象樅然更待截鶴續鳧夷嶽盈壑何啻白雲千里萬里至節上堂一年復一年一冬復一冬海水知天寒枯桑知天風諸人了了常知甚處是如如不動拍禪牀云一陽生也上堂大智發於心且莫草草匇匇於心何處尋果然古人與麼大似大開口了合不得聖節上堂十方國土中惟有一乘法如天普蓋似地普擎野老謳歌漁人舞棹只如蒲團上打坐佛殿裡燒香又且如何恩大難酬除夜小參道無蹊徑平地裡礙却潼關其數河沙法離見聞劒刃上翻得身來萬中無一除是不存窠臼不立孤危戢玄機未兆已前進得一步家貧難辦素食藏冥運即化之際突得一句事忙不及草書三九二十七菩提涅槃真如解脫睦州陳蒲鞋倒腹傾腸猶欠一著如何是那一著角吹新歲曲梅放去年花復舉丹霞一日與龐居士行次見一泓水士以手指云得恁麼也還辨不出霞云灼然是辨不出士乃戽水潑霞三下霞云莫恁麼莫恁麼士云須恁麼須恁麼霞戽水潑士三下士云正當恁麼時堪作甚麼霞云無外物士云得便宜者少霞不語士云誰是落便宜者師云莫恁麼須恁麼得便宜落便宜戽水相潑小兒子戲上堂智門蓮花趙州庭柏不用低頭思量難得上堂吾本來茲土傳法救迷情面皮厚多少一花開五葉結果自然成蕪纇清平盡西天此土之鐵不能鑄此一錯且諸人向甚處見祖師佛涅槃上堂舉世尊臨入涅槃文殊請再轉法輪世尊云文殊吾四十九年住世未嘗談一字今請吾再轉法輪是吾曾轉法輪耶師云文殊為衆竭力世尊滿口含霜雖然如是千言萬語無人會又逐流鶯過短墻三月旦上堂陌上桃花庭前翠竹竹無省人之意花無悟人之心靈雲香嚴合著石調玄沙寂子逐惡隨邪良久云誰在畫樓沽酒處相邀來喫趙州茶安撫供水陸上堂舉王常侍一日判事次米和尚至常侍竪起筆米和尚云還判得虗空麼常侍擲下筆入去師頌云機輪活脫走珠盤妙處都盧在筆端竪起依然還放下靈鋒寶劒倚天寒結夏上堂四月十五靈山直舉捻聚處放開放開處捻聚且道與西天阿蘭那寺所説是同是別良久云百丈耳聾黃檗吐舌上堂佛子住此地踏著依前不相似即是佛受用切忌喚鐘而作甕經行及坐臥常在於其中鶴有九臯難翥翼馬無千里謾追風青苗上堂口欲談而詞喪心欲緣而慮忘滿慈鶖子曾未知龍樹馬鳴齊卷舌靈山今日破微塵拍禪牀云出經卷明朝後日釘釘膠粘一箇半箇破句讀却説甚麼一周佛事十方虗空悉皆消殞徑山石溪佛海禪師遺書至上堂多添少減滅却白雲正傳詐啞佯聾摟盡松源窟穴攪翻四大海話行三十年若謂歐峯破鐵連寨碎鐵蒺藜要見徑山猶未可在畢竟甚處相見十方無壁落遍界黑漫漫開爐上堂舉趙州因僧侍次州挾火示之云你不得喚作火老僧道了也復挾起火云會麼僧云不會州云此去舒州有投子和尚汝去必能為汝説僧到投子投子問近離甚處僧云趙州投子云趙州有何言句僧舉前話投子云汝會麼僧云不會乞師指示投子下禪牀行三步却問會麼僧云不會投子云汝歸舉似趙州僧歸舉似趙州州云投子與麼不較多也師云二大老更相發明兩箇五百要成一貫不覺墮在者僧手中畢竟那裡是不較多處上堂天寒人寒風動幡動與麼與麼大難大難一二三四五放待冷來看
