front:
  text: 偃溪禪師八坐道場學者奔赴如水赴壑所存句語流傳諸方一則並無一句踏襲二則亦無一句重疊三則塞盡知見理路四則截斷葛藤窠臼只此四著盡掃近日法門獘病宜其傑出一時也吾因知偃溪平昔昔無說之說學者讀之當以無聞之聞所謂單單只賣死猫頭喫者通身冷汗流作用不愧前輩矣余不足以與此聊提帙端以識欣快開慶改元結夏日晉陵尤焴得道之士不言非少有言非多故曰吾無隱乎爾予豈好辯哉以閉口為隱以開口為辯是盲者過非日月咎予觀偃溪平居泊然如閑雲悄然如枯木及其振衣踞座隱隱鍧鍧則有口者喪伸紙奮筆灑灑落落則有手者縮豈所謂大辯若訥深藏若虗者耶近代法末號大尊宿者未免重名聞著施利履踐未離濁惡說法豈有靈驗偃溪獨忘懷聲利味如嚼蠟故其胸中流出一一高妙二十年後話當大行或問予何以知之曰我知言寶祐戊午日南至湯漢伯紀書佛智禪師偃溪和尚語錄目次上卷尤焴東㵎序文二首顯應淨慈禪寺語錄香山智度禪寺語錄慶元萬壽禪寺語錄應夢山雪竇資聖禪寺語錄阿育王山廣利禪寺語錄淨慈報恩光孝禪寺語錄景德靈隱禪寺語錄下卷徑山興聖萬壽禪寺語錄普說法語偈頌佛祖讚自讚小佛事題䟦遺表塔銘䟦
