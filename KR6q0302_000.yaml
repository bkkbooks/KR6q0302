body:
  text: 偃溪禪師八坐道場學者奔赴如水赴壑所存句語流傳諸方一則並無一句踏襲二則亦無一句重疊三則塞盡知見理路四則截斷葛藤窠臼只此四著盡掃近日法門斃病宜其傑出一時也吾因知偃溪平昔昔無説之説學者讀之當以無聞之聞所謂單單只賣死貓頭喫者通身冷汗流作用不愧前輩矣余不足以與此聊提帙端以識欣快開慶改元結夏日晉陵尤焴得道之士不言非少有言非多故曰吾無隱乎爾豫豈好辨哉以閉口為隱以開口為辨是盲者過非日月咎豫觀偃溪平居泊然如間雲悄然如枯木及其振衣踞座隱隱鍧鍧則有口者喪伸紙奮筆灑灑落落則有手者縮豈所謂大辨若訥深藏若虗者耶近代法末號大尊宿者未免重名聞著施利履踐未離濁惡説法豈有靈驗偃溪獨忘懷聲利味如嚼蠟故其胸中流出一一高妙二十年後話當大行或問豫何以知之曰我知言寶祐戊午日南至湯漢伯紀書佛智禪師偃溪和尚語録目次上卷尤焴東澗序文二首顯應淨慈禪寺語録香山智度禪寺語録慶元萬壽禪寺語録應夢山雪竇資聖禪寺語録阿育王山廣利禪寺語録淨慈報恩光孝禪寺語録景德靈隱禪寺語録下卷徑山興聖萬壽禪寺語録普説法語偈頌佛祖讚自讚小佛事題跋遺表塔銘跋
